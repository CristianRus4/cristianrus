<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="stylesheet" type="text/css" href="style.css">
<link rel="shortcut icon" type="image/png" href="images/favicon.png"/>
<title>workouts</title>
<style>
  /* Page-local only; colors/fonts come from style.css */
  .filters { display: flex; flex-wrap: wrap; gap: 0.25em 1.25em; margin: 0.5em 0 2em; }
  .filters button {
    background: none; border: none; cursor: pointer; padding: 0;
    font: inherit; color: var(--text); opacity: 0.6;
  }
  .filters button.on { opacity: 1; font-weight: 600; color: var(--title); }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5em 1em; margin-bottom: 2.5em; }
  @media (min-width: 480px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat .n { font-size: 1.8em; font-weight: 600; color: var(--title); line-height: 1.1; }
  .stat .l { font-size: 0.85em; opacity: 0.7; }

  .bars { margin: 0.5em 0 2.5em; }
  .bar-row { display: grid; grid-template-columns: 3.5em 1fr auto; align-items: center; gap: 0.6em; margin: 0.35em 0; }
  .bar-row .lab { font-size: 0.9em; text-align: right; opacity: 0.8; }
  .bar-track { background: color-mix(in srgb, var(--text) 15%, transparent); border-radius: 4px; height: 0.7em; }
  .bar-fill { background: var(--item-bar); height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .bar-row .val { font-size: 0.85em; opacity: 0.7; min-width: 3.2em; text-align: right; }

  .workout { margin-bottom: 1.1em; }
  .workout summary { cursor: pointer; list-style: none; }
  .workout summary::-webkit-details-marker { display: none; }
  .workout .meta { opacity: 0.75; font-size: 0.9em; }
  .workout .map { width: 100%; border-radius: 1em; margin-top: 0.75em; }
  #enrich { font-size: 0.8em; opacity: 0.6; }
</style>
</head>
<body>

  <h1 class="title"><a class="titlelink" href="/">Cristian Rus</a></h1>
  <p class="sub">workouts</p>

  <p id="status"></p>
  <p id="connect" style="display:none;"></p>

  <div id="dash" style="display:none;">
    <div class="filters" id="filters">
      <button data-range="week">this week</button>
      <button data-range="month">this month</button>
      <button data-range="90d">last 90 days</button>
      <button data-range="year" class="on">this year</button>
      <button data-range="all">all time</button>
    </div>

    <div class="stats" id="stats"></div>

    <h2>workout pattern</h2>
    <div class="bars" id="dow"></div>

    <h2>distribution by type</h2>
    <div class="bars" id="types"></div>

    <h2>latest workouts</h2>
    <div id="list"></div>
  </div>

<script src="strava.js"></script>
<script>
(function () {
  const statusEl  = document.getElementById("status");
  const connectEl = document.getElementById("connect");
  const dashEl    = document.getElementById("dash");
  const statsEl   = document.getElementById("stats");
  const dowEl     = document.getElementById("dow");
  const typesEl   = document.getElementById("types");
  const listEl    = document.getElementById("list");
  const filtersEl = document.getElementById("filters");

  let ALL = [];          // every activity (summary)
  let range = "year";    // active filter
  let enrichGen = 0;     // bumps when filter changes, to cancel stale kcal enrichment

  /* ---------- formatters ---------- */
  const kmRaw = (m) => m / 1000;
  const km = (m) => m == null ? "—" : (m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m");
  function dur(s) {
    if (s == null) return "—";
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.round(s % 60);
    return (h ? h + "h " : "") + (m || h ? m + "m " : "") + sec + "s";
  }
  function durShort(s) {
    const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
    return h ? `${h}h ${m}m` : `${m}m`;
  }
  function pace(mps, type) {
    if (!mps) return "—";
    if (/Ride|Cycl|EBike|Velo|Handcycle/i.test(type || "")) return (mps * 3.6).toFixed(1) + " km/h";
    const spk = 1000 / mps, mm = Math.floor(spk / 60), ss = Math.round(spk % 60);
    return mm + ":" + String(ss).padStart(2, "0") + " /km";
  }
  const speed = (mps) => mps == null ? "—" : (mps * 3.6).toFixed(1) + " km/h";
  const elev  = (m) => m == null ? "—" : Math.round(m) + " m";
  const dt    = (iso) => iso ? new Date(iso).toLocaleString(undefined,
    { weekday: "short", year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
  const esc   = (s) => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  /* ---------- filtering ---------- */
  function rangeStart(r) {
    const now = new Date();
    if (r === "week") {
      const d = new Date(now); const day = (d.getDay() + 6) % 7; // Monday = 0
      d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - day); return d;
    }
    if (r === "month") return new Date(now.getFullYear(), now.getMonth(), 1);
    if (r === "90d")   { const d = new Date(now); d.setDate(d.getDate() - 90); return d; }
    if (r === "year")  return new Date(now.getFullYear(), 0, 1);
    return new Date(0); // all
  }
  function filtered() {
    const start = rangeStart(range);
    return ALL.filter(a => new Date(a.start_date_local || a.start_date) >= start);
  }

  /* ---------- headline stats ---------- */
  function renderStats(list) {
    const dist = list.reduce((s, a) => s + (a.distance || 0), 0);
    const time = list.reduce((s, a) => s + (a.moving_time || 0), 0);
    const gain = list.reduce((s, a) => s + (a.total_elevation_gain || 0), 0);
    // kcal only exists on detailed activities; sum whatever is already cached.
    const kcal = list.reduce((s, a) => {
      const d = Strava.getCachedDetail(a.id);
      return s + (d && d.calories ? d.calories : 0);
    }, 0);

    statsEl.innerHTML = [
      [list.length, "sessions"],
      [kmRaw(dist).toFixed(1) + " km", "distance"],
      [durShort(time), "moving time"],
      [Math.round(gain) + " m", "elevation"],
      [kcal ? Math.round(kcal).toLocaleString() : "—", `kcal <span id="enrich"></span>`],
    ].map(([n, l]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  }

  function barRows(container, entries, fmtVal) {
    const max = Math.max(1, ...entries.map(e => e.value));
    container.innerHTML = entries.map(e => `
      <div class="bar-row">
        <span class="lab">${e.label}</span>
        <span class="bar-track"><span class="bar-fill" style="width:${(e.value / max * 100).toFixed(1)}%"></span></span>
        <span class="val">${fmtVal(e)}</span>
      </div>`).join("");
  }

  function renderDow(list) {
    const names = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const counts = [0, 0, 0, 0, 0, 0, 0];
    list.forEach(a => { const d = new Date(a.start_date_local || a.start_date); counts[(d.getDay() + 6) % 7]++; });
    const total = list.length || 1;
    barRows(dowEl, names.map((n, i) => ({ label: n, value: counts[i] })),
      e => (e.value / total * 100).toFixed(0) + "%");
  }

  function renderTypes(list) {
    const m = {};
    list.forEach(a => { const t = a.sport_type || a.type || "Other"; m[t] = (m[t] || 0) + 1; });
    const entries = Object.entries(m).map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value);
    barRows(typesEl, entries, e => e.value);
  }

  /* ---------- detail table (all fields) ---------- */
  function detailTable(a) {
    const loc = [a.location_city, a.location_state, a.location_country].filter(Boolean).join(", ");
    const map = a.map && (a.map.polyline || a.map.summary_polyline);
    const r = (k, v) => (v === undefined || v === null || v === "" || (typeof v === "number" && isNaN(v))) ? "" : `<tr><th>${k}</th><td>${v}</td></tr>`;
    let html = "";
    if (map) html += `<img class="map" alt="route" src="https://staticmap.openstreetmap.de/staticmap.php?size=640x280&path=color:0x555555|weight:4|${encodeURIComponent("enc:" + map)}" onerror="this.style.display='none'">`;
    html += "<table>";
    html += r("type", a.sport_type || a.type);
    html += r("workout type", a.workout_type);
    html += r("distance", km(a.distance));
    html += r("moving time", dur(a.moving_time));
    html += r("elapsed time", dur(a.elapsed_time));
    html += r("start (local)", dt(a.start_date_local));
    html += r("start (utc)", dt(a.start_date));
    html += r("timezone", a.timezone);
    html += r("location", loc);
    html += r("start lat/lng", a.start_latlng && a.start_latlng.length ? a.start_latlng.map(n => n.toFixed(5)).join(", ") : null);
    html += r("end lat/lng", a.end_latlng && a.end_latlng.length ? a.end_latlng.map(n => n.toFixed(5)).join(", ") : null);
    html += r("avg speed", speed(a.average_speed));
    html += r("max speed", speed(a.max_speed));
    html += r("avg pace", pace(a.average_speed, a.sport_type || a.type));
    html += r("avg cadence", a.average_cadence);
    html += r("avg power", a.average_watts != null ? a.average_watts + " W" : null);
    html += r("weighted power", a.weighted_average_watts != null ? a.weighted_average_watts + " W" : null);
    html += r("max power", a.max_watts != null ? a.max_watts + " W" : null);
    html += r("energy", a.kilojoules != null ? a.kilojoules + " kJ" : null);
    html += r("calories", a.calories);
    html += r("avg temp", a.average_temp != null ? a.average_temp + " °C" : null);
    html += r("avg heart rate", a.average_heartrate != null ? a.average_heartrate + " bpm" : null);
    html += r("max heart rate", a.max_heartrate != null ? a.max_heartrate + " bpm" : null);
    html += r("suffer score", a.suffer_score);
    html += r("perceived exertion", a.perceived_exertion);
    html += r("elevation gain", elev(a.total_elevation_gain));
    html += r("elevation high", elev(a.elev_high));
    html += r("elevation low", elev(a.elev_low));
    html += r("kudos", a.kudos_count);
    html += r("comments", a.comment_count);
    html += r("athletes", a.athlete_count);
    html += r("photos", a.total_photo_count != null ? a.total_photo_count : a.photo_count);
    html += r("achievements", a.achievement_count);
    html += r("PRs", a.pr_count);
    html += r("segment efforts", a.segment_efforts ? a.segment_efforts.length : null);
    html += r("best efforts", a.best_efforts ? a.best_efforts.length : null);
    html += r("gear", a.gear && a.gear.name);
    html += r("device", a.device_name);
    html += r("commute", a.commute ? "yes" : null);
    html += r("trainer", a.trainer ? "yes" : null);
    html += r("manual", a.manual ? "yes" : null);
    html += r("private", a.private ? "yes" : null);
    html += r("description", a.description ? esc(a.description) : null);
    html += r("activity id", a.id);
    html += r("link", `<a href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">open on Strava</a>`);
    html += "</table>";
    return html;
  }

  function workoutEl(a) {
    const det = document.createElement("details");
    det.className = "workout item";
    det.innerHTML =
      `<summary><span class="tit">${esc(a.name || "(untitled)")}</span><br>` +
      `<span class="meta">${esc(a.sport_type || a.type)} · ${dt(a.start_date_local || a.start_date)} · ` +
      `${km(a.distance)} · ${dur(a.moving_time)} · ${pace(a.average_speed, a.sport_type || a.type)}</span></summary>` +
      `<div class="body"></div>`;
    const body = det.querySelector(".body");
    let loaded = false;
    det.addEventListener("toggle", async () => {
      if (!det.open || loaded) return;
      loaded = true;
      body.innerHTML = `<p class="meta">loading…</p>`;
      try { body.innerHTML = detailTable(await Strava.getActivityCached(a.id)); }
      catch (e) { body.innerHTML = detailTable(a) + `<p class="meta">(summary only — ${esc(e.message)})</p>`; }
    });
    return det;
  }

  function renderList(list) {
    listEl.innerHTML = "";
    list.slice(0, 25).forEach(a => listEl.appendChild(workoutEl(a)));
  }

  /* ---------- background kcal enrichment (fetch details, throttled) ---------- */
  async function enrich(list) {
    const gen = ++enrichGen;
    const enrichNote = document.getElementById("enrich");
    const todo = list.filter(a => !Strava.getCachedDetail(a.id));
    if (!todo.length) { if (enrichNote) enrichNote.textContent = ""; return; }
    let done = 0;
    for (const a of todo) {
      if (gen !== enrichGen) return; // filter changed — abort
      try { await Strava.getActivityCached(a.id); }
      catch (e) { if (/429/.test(e.message)) { if (enrichNote) enrichNote.textContent = "(rate-limited)"; return; } }
      done++;
      if (done % 3 === 0 || done === todo.length) {
        renderStats(filtered()); // refresh kcal live
        const note = document.getElementById("enrich");
        if (note) note.textContent = done < todo.length ? `(loading ${done}/${todo.length})` : "";
      }
      await new Promise(res => setTimeout(res, 180)); // be gentle with rate limits
    }
  }

  /* ---------- render everything for the active range ---------- */
  function render() {
    const list = filtered();
    statusEl.textContent = `${ALL.length} activities total · showing ${list.length} for "${rangeLabel(range)}"`;
    renderStats(list);
    renderDow(list);
    renderTypes(list);
    renderList(list);
    enrich(list);
  }
  function rangeLabel(r) {
    return { week: "this week", month: "this month", "90d": "last 90 days", year: "this year", all: "all time" }[r];
  }

  filtersEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-range]");
    if (!btn) return;
    range = btn.dataset.range;
    [...filtersEl.querySelectorAll("button")].forEach(b => b.classList.toggle("on", b === btn));
    render();
  });

  /* ---------- boot ---------- */
  async function main() {
    try { await Strava.init(); }
    catch (e) { statusEl.textContent = e.message; }

    if (!Strava.isConnected()) {
      statusEl.textContent = "Not connected to Strava yet.";
      connectEl.style.display = "block";
      connectEl.innerHTML = `<a href="${Strava.authorizeUrl()}">Connect with Strava →</a>`;
      return;
    }

    // Show instantly from cache if we have it, then refresh in the background.
    const cache = Strava.cachedActivities();
    if (cache && Array.isArray(cache.data) && cache.data.length) {
      ALL = cache.data; dashEl.style.display = "block"; render();
    } else {
      statusEl.textContent = "loading all activities…";
    }

    try {
      ALL = await Strava.getAllActivities({ onProgress: n => { if (!cache) statusEl.textContent = `loading… ${n} activities`; } });
      dashEl.style.display = "block";
      render();
    } catch (e) {
      const msg = e.message || String(e);
      if (/scope|activity:read|authoriz/i.test(msg)) {
        statusEl.textContent = "Your authorization is missing the activity:read scope.";
        connectEl.style.display = "block";
        connectEl.innerHTML = `Re-authorize: <a href="${Strava.authorizeUrl()}">Connect with Strava →</a>`;
      } else if (!ALL.length) {
        statusEl.textContent = "Couldn't load activities: " + msg;
      }
    }
  }

  main();
})();
</script>

</body>
</html>
