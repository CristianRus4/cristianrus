<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta
      name="description"
      content="Nightly Digest — open today's digest."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.cristianrus.me/nightly">
    <meta property="og:title" content="Nightly Digest">
    <meta
      property="og:description"
      content="Open today's digest."
    >
    <meta property="og:image" content="https://www.cristianrus.me/images/avatar.jpg">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="../images/favicon.ico">
    <title>Nightly Digest</title>
    <style>
      @font-face {
        font-family: "Quattro";
        src: url("../fonts/Quattro.woff") format("woff");
      }

      @font-face {
        font-family: "Quattro Italic";
        src: url("../fonts/Quattro-Italic.woff") format("woff");
      }

      :root {
        color-scheme: light dark;
        font-size: 18px;
        --black-rgb: 248, 245, 239;
        --gold-rgb: 196, 169, 110;
        --bg: #0e0d0b;
        --surface: #161510;
        --border: rgba(var(--black-rgb), 0.18);
        --text: rgb(var(--black-rgb));
        --dim: rgba(var(--black-rgb), 0.7);
        --accent: rgb(var(--gold-rgb));
        --accent-dim: rgba(var(--gold-rgb), 0.6);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --black-rgb: 17, 17, 17;
          --gold-rgb: 112, 84, 28;
          --bg: #ffffff;
          --surface: #f5f5f5;
          --border: rgba(var(--black-rgb), 0.16);
          --text: rgb(var(--black-rgb));
          --dim: rgba(var(--black-rgb), 0.7);
          --accent: rgb(var(--gold-rgb));
          --accent-dim: rgba(var(--gold-rgb), 0.6);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        color: var(--text);
        font-family: "Quattro", serif;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
      }

      .launcher {
        position: relative;
        min-height: 100vh;
        padding: 2rem 1.25rem 5.5rem;
      }

      .launcher-main {
        min-height: calc(100vh - 7.5rem);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .launcher-stack {
        display: grid;
        justify-items: center;
        gap: 1rem;
        width: 100%;
        text-align: center;
      }

      .launcher-title,
      .archive-toggle {
        margin: 0;
        font-family: "Quattro Italic", serif;
        color: var(--accent);
      }

      .launcher-title {
        margin: 0 -0.22em 2.5rem 0;
        font-size: clamp(1.4rem, 5vw, 1.8rem);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .archive-toggle {
        position: absolute;
        left: 50%;
        bottom: 1.75rem;
        transform: translateX(-50%);
        padding: 0;
        background: transparent;
        font-size: 0.95rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .archive-toggle:focus-visible,
      .open-digest-button:focus-visible,
      .archive-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .open-digest-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.4rem;
        min-width: 14.5rem;
        padding: 0.8rem 1.2rem;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 1.15rem;
        transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
        cursor: pointer;
      }

      .open-digest-button:hover,
      .open-digest-button:focus-visible,
      .archive-link:hover,
      .archive-link:focus-visible,
      .archive-toggle:hover,
      .archive-toggle:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
      }

      .status {
        min-height: 1rem;
        margin: 0;
        color: var(--dim);
        font-size: 0.74rem;
        letter-spacing: 0.06em;
      }

      .archive-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        max-height: 75vh;
        padding: 1rem 1.25rem 1.5rem;
        border-top: 1px solid var(--border);
        background: var(--bg);
        overflow: auto;
        transform: translateY(calc(100% - 4rem));
        transition: transform 220ms ease;
      }

      .archive-panel.is-open {
        transform: translateY(0);
      }

      .archive-panel-header {
        position: sticky;
        top: -1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin: 0 0 1rem;
        padding: 0.2rem 0 0.7rem;
        background: var(--bg);
      }

      .archive-heading {
        margin: 0;
        font-family: "Quattro Italic", serif;
        font-size: 1.3rem;
        font-weight: 400;
        color: var(--accent);
      }

      .archive-close {
        padding: 0;
        background: transparent;
        color: var(--dim);
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.72rem;
      }

      .archive-groups {
        display: grid;
        gap: 1.5rem;
      }

      .archive-group-title {
        margin: 0 0 0.55rem;
        font-family: "Quattro Italic", serif;
        font-size: 0.82rem;
        font-weight: 400;
        color: var(--accent-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .archive-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .archive-item + .archive-item {
        margin-top: 0.45rem;
      }

      .archive-link {
        display: inline-flex;
        width: 100%;
        padding: 0.45rem 0;
        border-bottom: 1px solid transparent;
        text-decoration: none;
        transition: border-color 180ms ease, color 180ms ease;
      }

      .archive-meta {
        color: var(--text);
      }

      @media (max-width: 640px) {
        .archive-panel {
          max-height: 80vh;
          padding-left: 1rem;
          padding-right: 1rem;
        }

        .launcher {
          padding-bottom: 5rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="launcher">
      <section class="launcher-main">
        <div class="launcher-stack">
          <h1 class="launcher-title">NIGHTLY DIGEST</h1>
          <button type="button" class="open-digest-button" id="openDigestButton">Reveal today's digest</button>
          <p class="status" id="status"></p>
        </div>
      </section>

      <button
        type="button"
        class="archive-toggle"
        id="archiveToggle"
        aria-expanded="false"
        aria-controls="archivePanel"
      >
        Show Archive
      </button>
    </main>

    <aside class="archive-panel" id="archivePanel" hidden>
      <div class="archive-panel-header">
        <h2 class="archive-heading">Archive</h2>
        <button type="button" class="archive-close" id="archiveClose">Close</button>
      </div>
      <div class="archive-groups" id="archiveGroups"></div>
    </aside>

    <script>
      (function () {
        var archiveEntries = [
          { date: "2026-05-14", title: "Private Ceremonies for Changed Beliefs" },
          { date: "2026-05-13", title: "What Boredom Uncovers" },
          { date: "2026-05-12", title: "The Long Take as an Argument" },
          { date: "2026-05-11", title: "The Body Keeps Its Own Archive" },
          { date: "2026-05-10", title: "Spaces That Hold You Without Meaning To" },
          { date: "2026-05-09", title: "The Damage a Word Does When It Lands" },
          { date: "2026-05-08", title: "How Rooms Grow After You Leave Them" },
          { date: "2026-05-07", title: "The Slow Intelligence of Rot" },
          { date: "2026-05-06", title: "The Weight of What Has Not Yet Happened" }
        ];
        var button = document.getElementById("openDigestButton");
        var status = document.getElementById("status");
        var archivePanel = document.getElementById("archivePanel");
        var archiveToggle = document.getElementById("archiveToggle");
        var archiveClose = document.getElementById("archiveClose");
        var archiveGroups = document.getElementById("archiveGroups");

        renderArchive(archiveEntries);

        button.onclick = function () {
          button.disabled = true;
          status.textContent = "Finding today's digest...";
          resolveDigest(getCandidateDates(), 0);
        };

        archiveToggle.onclick = function () {
          setArchiveOpen(!archivePanel.classList.contains("is-open"));
        };

        archiveClose.onclick = function () {
          setArchiveOpen(false);
        };

        function setArchiveOpen(isOpen) {
          archivePanel.hidden = false;
          archivePanel.classList.toggle("is-open", isOpen);
          archiveToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
          archiveToggle.textContent = isOpen ? "Hide Archive" : "Show Archive";
          if (!isOpen) {
            window.setTimeout(function () {
              if (!archivePanel.classList.contains("is-open")) {
                archivePanel.hidden = true;
              }
            }, 220);
          }
        }

        function resolveDigest(candidates, index) {
          if (index >= candidates.length) {
            status.textContent = "Opening the latest available digest...";
            if (archiveEntries.length) {
              window.location.href = "./digests/" + archiveEntries[0].date + ".html";
              return;
            }
            button.disabled = false;
            status.textContent = "No digest found.";
            return;
          }

          var date = candidates[index];
          var path = "./digests/" + date + ".html";
          var request = new XMLHttpRequest();

          request.open("HEAD", path, true);
          request.onreadystatechange = function () {
            if (request.readyState !== 4) {
              return;
            }

            if (request.status >= 200 && request.status < 400) {
              window.location.href = path;
              return;
            }

            resolveDigest(candidates, index + 1);
          };
          request.onerror = function () {
            resolveDigest(candidates, index + 1);
          };
          request.send(null);
        }

        function renderArchive(entries) {
          var groups;
          var html;
          var index;
          var group;

          groups = groupByMonth(entries.slice().sort(function (left, right) {
            return right.date.localeCompare(left.date);
          }));
          html = "";

          for (index = 0; index < groups.length; index += 1) {
            group = groups[index];
            html += "<section>";
            html += "<h3 class=\"archive-group-title\">" + escapeHtml(group.label) + "</h3>";
            html += "<ul class=\"archive-list\">";
            html += group.items.map(function (entry) {
              return "<li class=\"archive-item\"><a class=\"archive-link\" href=\"./digests/" +
                escapeHtml(entry.date) +
                ".html\"><span class=\"archive-meta\">" +
                escapeHtml(formatArchiveDate(entry.date) + " \u2013 " + entry.title) +
                "</span></a></li>";
            }).join("");
            html += "</ul>";
            html += "</section>";
          }

          archiveGroups.innerHTML = html;
        }

        function groupByMonth(entries) {
          var groups = [];
          var lookup = {};
          var index;
          var entry;
          var monthKey;

          for (index = 0; index < entries.length; index += 1) {
            entry = entries[index];
            monthKey = entry.date.slice(0, 7);

            if (!lookup[monthKey]) {
              lookup[monthKey] = {
                label: formatMonthYear(entry.date),
                items: []
              };
              groups.push(lookup[monthKey]);
            }

            lookup[monthKey].items.push(entry);
          }

          return groups;
        }

        function getCandidateDates() {
          var now = new Date();
          var localToday = formatLocalDate(now);
          var utcToday = formatUtcDate(now);
          var localYesterday = formatLocalDate(shiftLocalDate(now, -1));
          var localTomorrow = formatLocalDate(shiftLocalDate(now, 1));
          var dates = [localToday, utcToday, localYesterday, localTomorrow];
          var unique = [];
          var seen = {};
          var index;

          for (index = 0; index < dates.length; index += 1) {
            if (!seen[dates[index]]) {
              seen[dates[index]] = true;
              unique.push(dates[index]);
            }
          }

          return unique;
        }

        function shiftLocalDate(date, amount) {
          return new Date(date.getFullYear(), date.getMonth(), date.getDate() + amount);
        }

        function formatLocalDate(date) {
          return [
            String(date.getFullYear()),
            pad(date.getMonth() + 1),
            pad(date.getDate())
          ].join("-");
        }

        function formatUtcDate(date) {
          return [
            String(date.getUTCFullYear()),
            pad(date.getUTCMonth() + 1),
            pad(date.getUTCDate())
          ].join("-");
        }

        function formatArchiveDate(dateString) {
          var parts = String(dateString).split("-");
          var year = Number(parts[0]);
          var month = Number(parts[1]);
          var day = Number(parts[2]);
          var months = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December"
          ];

          return ordinal(day) + " " + months[month - 1] + " " + year;
        }

        function formatMonthYear(dateString) {
          var parts = String(dateString).split("-");
          var year = Number(parts[0]);
          var month = Number(parts[1]);
          var months = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December"
          ];

          return months[month - 1] + " " + year;
        }

        function ordinal(value) {
          var remainder = value % 100;
          if (remainder >= 11 && remainder <= 13) {
            return value + "th";
          }
          switch (value % 10) {
            case 1:
              return value + "st";
            case 2:
              return value + "nd";
            case 3:
              return value + "rd";
            default:
              return value + "th";
          }
        }

        function pad(value) {
          return value < 10 ? "0" + value : String(value);
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }
      })();
    </script>
  </body>
</html>
