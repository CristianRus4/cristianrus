<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta
      name="description"
      content="Nightly Digest — open today's digest."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.cristianrus.me/nightly">
    <meta property="og:title" content="Nightly Digest">
    <meta
      property="og:description"
      content="Open today's digest."
    >
    <meta property="og:image" content="https://www.cristianrus.me/images/avatar.jpg">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="../images/favicon.ico">
    <title>Nightly Digest</title>
    <style>
      @font-face {
        font-family: "Quattro";
        src: url("../fonts/Quattro.woff") format("woff");
      }

      @font-face {
        font-family: "Quattro Italic";
        src: url("../fonts/Quattro-Italic.woff") format("woff");
      }

      :root {
        color-scheme: light dark;
        --bg: #f6f4ef;
        --text: #2b2720;
        --dim: #726a5f;
        --accent: #8b6b2f;
        --border: rgba(139, 107, 47, 0.22);
        --button-bg: rgba(139, 107, 47, 0.08);
        --button-bg-hover: rgba(139, 107, 47, 0.14);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0d0b;
          --text: #c8c2b4;
          --dim: #6b6560;
          --accent: #c4a96e;
          --border: rgba(196, 169, 110, 0.28);
          --button-bg: rgba(196, 169, 110, 0.08);
          --button-bg-hover: rgba(196, 169, 110, 0.15);
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(139, 107, 47, 0.08), transparent 42%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 40%),
          var(--bg);
      }

      body {
        display: grid;
        place-items: center;
        padding: 1.5rem;
        color: var(--text);
        font-family: "Quattro", serif;
      }

      main {
        width: min(100%, 34rem);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 1.1rem;
        color: var(--dim);
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: "Quattro Italic", serif;
        font-size: clamp(2.4rem, 7vw, 4.4rem);
        font-weight: 400;
        line-height: 1.02;
        color: var(--accent);
      }

      p {
        margin: 0 0 2rem;
        color: var(--dim);
        font-size: 1rem;
        line-height: 1.65;
      }

      button {
        width: min(100%, 24rem);
        min-height: 5.5rem;
        padding: 1.2rem 1.6rem;
        border: 1px solid var(--border);
        background: var(--button-bg);
        color: var(--text);
        font-family: "Quattro Italic", serif;
        font-size: clamp(1.35rem, 4vw, 1.9rem);
        line-height: 1.2;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: background-color 180ms ease, transform 180ms ease, border-color 180ms ease;
      }

      button:hover,
      button:focus-visible {
        background: var(--button-bg-hover);
        border-color: var(--accent);
        transform: translateY(-1px);
        outline: none;
      }

      .status {
        min-height: 1.2rem;
        margin-top: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Nightly Digest</p>
      <h1>Tonight waits behind one button.</h1>
      <p>Open the digest for the current day.</p>
      <button type="button" id="openDigestButton">Open today's digest</button>
      <p class="status" id="status"></p>
    </main>

    <script>
      (function () {
        var button = document.getElementById("openDigestButton");
        var status = document.getElementById("status");

        button.onclick = function () {
          button.disabled = true;
          status.innerHTML = "Finding today's digest...";
          resolveDigest(getCandidateDates(), 0);
        };

        function resolveDigest(candidates, index) {
          if (index >= candidates.length) {
            status.innerHTML = "No digest found for the nearby dates.";
            window.location.href = "./digests/index.html";
            return;
          }

          var date = candidates[index];
          var path = "./digests/" + date + ".html";
          var request = new XMLHttpRequest();

          request.open("HEAD", path, true);
          request.onreadystatechange = function () {
            if (request.readyState !== 4) {
              return;
            }

            if (request.status >= 200 && request.status < 400) {
              window.location.href = path;
              return;
            }

            resolveDigest(candidates, index + 1);
          };
          request.onerror = function () {
            resolveDigest(candidates, index + 1);
          };
          request.send(null);
        }

        function getCandidateDates() {
          var now = new Date();
          var localToday = formatLocalDate(now);
          var utcToday = formatUtcDate(now);
          var localYesterday = formatLocalDate(shiftLocalDate(now, -1));
          var localTomorrow = formatLocalDate(shiftLocalDate(now, 1));
          var dates = [localToday, utcToday, localYesterday, localTomorrow];
          var unique = [];
          var seen = {};
          var index;

          for (index = 0; index < dates.length; index += 1) {
            if (!seen[dates[index]]) {
              seen[dates[index]] = true;
              unique.push(dates[index]);
            }
          }

          return unique;
        }

        function shiftLocalDate(date, amount) {
          return new Date(date.getFullYear(), date.getMonth(), date.getDate() + amount);
        }

        function formatLocalDate(date) {
          return [
            String(date.getFullYear()),
            pad(date.getMonth() + 1),
            pad(date.getDate())
          ].join("-");
        }

        function formatUtcDate(date) {
          return [
            String(date.getUTCFullYear()),
            pad(date.getUTCMonth() + 1),
            pad(date.getUTCDate())
          ].join("-");
        }

        function pad(value) {
          return value < 10 ? "0" + value : String(value);
        }
      })();
    </script>
  </body>
</html>
