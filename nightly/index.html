<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta
      name="description"
      content="Nightly Digest — a static daily page with an essay, a question ritual, and a small game."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.cristianrus.me/nightly">
    <meta property="og:title" content="Nightly Digest">
    <meta
      property="og:description"
      content="A nightly reading ritual with one digest per day."
    >
    <meta property="og:image" content="https://www.cristianrus.me/images/avatar.jpg">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="../images/favicon.ico">
    <title>Nightly Digest</title>
    <style>
      @font-face {
        font-family: "Quattro";
        src: url("../fonts/Quattro.woff") format("woff");
      }

      @font-face {
        font-family: "Quattro Italic";
        src: url("../fonts/Quattro-Italic.woff") format("woff");
      }

      :root {
        color-scheme: light dark;
        font-size: 18px;
        --bg: #f6f4ef;
        --surface: #ece9e2;
        --border: #d6d1c5;
        --text: #2b2720;
        --dim: #726a5f;
        --accent: #8b6b2f;
        --accent-dim: #9a8560;
        --green: #2b7a55;
        --red: #b24a3b;
        --quote-text: #3a342a;
        --leading-inset: 0.45rem;
        --radius: 18px;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0d0b;
          --surface: #161510;
          --border: #2a2820;
          --text: #c8c2b4;
          --dim: #6b6560;
          --accent: #c4a96e;
          --accent-dim: #7a6840;
          --green: #7ab090;
          --red: #c07060;
          --quote-text: #ddd5c7;
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        max-width: 680px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 6rem;
        background: var(--bg);
        color: var(--text);
        font-family: "Quattro", serif;
        font-size: 18px;
        line-height: 1.78;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: auto;
        margin: 0;
        padding: 0;
      }

      .masthead {
        display: none;
      }

      .site-link {
        display: inline-block;
        font-family: "Quattro Italic", serif;
        font-size: 1.45rem;
        color: var(--accent);
      }

      .site-kicker {
        margin: 0.3rem 0 0;
        color: var(--dim);
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stack {
        display: block;
      }

      .card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .card + .card {
        margin-top: 2.3rem;
      }

      .section-rule {
        border-top: 1px solid var(--border);
        padding-top: 0.45rem;
      }

      .section-rule > .section-label {
        padding-right: 1.1rem;
      }

      .section-filled {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 0.45rem 1.1rem 1rem;
      }

      .card > :first-child {
        margin-top: 0;
      }

      .card > :last-child {
        margin-bottom: 0;
      }

      .section-label {
        margin: 0 0 0.4rem;
        color: var(--accent-dim);
        font-family: "Quattro Italic", serif;
        font-size: 0.72rem;
        opacity: 0.62;
        text-align: right;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding-right: 0.075rem;
      }

      .answer-card .section-label {
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        text-transform: none;
        text-align: left;
        padding-right: 0;
        margin-bottom: 0.35rem;
      }

      .date-line {
        margin: 0 0 2.5rem;
        color: var(--dim);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .entry-title {
        margin: 0 0 1rem;
        font-family: "Quattro Italic", serif;
        font-size: 2.1rem;
        font-weight: 400;
        color: var(--accent);
        line-height: 1.2;
      }

      .entry-subtitle {
        margin: 0;
        color: var(--dim);
        font-size: 0.9rem;
      }

      .fiction-box,
      .word-box,
      .answers-box {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.3rem 1.5rem;
      }
      .interactive-plain {
        background: transparent;
        border: 0;
        padding: 0;
      }

      .person-block {
        border-left: 0;
        padding-left: 0;
      }

      .prose p {
        margin: 0 0 1rem;
      }

      .essay-blockquote,
      .quote-block,
      .fragment-rail {
        margin: 1.8rem 0 1.8rem var(--leading-inset);
        padding: 0.2rem 1.3rem 0.2rem 1.4rem;
        border-left: 2px solid var(--accent-dim);
        color: var(--dim);
        background: transparent;
      }

      .fragment-rail {
        border-right: 0;
        border-top: 0;
        border-bottom: 0;
      }

      .fragment-rail p {
        font-family: "Quattro Italic", serif;
      }

      .essay-blockquote p,
      .quote-block p {
        margin: 0;
        font-family: "Quattro Italic", serif;
      }

      .crosslink {
        margin-top: 1rem;
        padding-top: 0.9rem;
        border-top: 1px solid rgba(196, 169, 110, 0.15);
        color: var(--dim);
      }

      .crosslink strong {
        color: var(--accent);
        font-weight: 600;
      }

      .number-value {
        margin: 0 0 0.45rem;
        font-family: "Quattro Italic", serif;
        font-size: 3.1rem;
        line-height: 1;
        color: var(--accent);
      }

      .word-term {
        margin: 0 0 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 3.1rem;
        line-height: 1;
        color: var(--accent);
      }

      .person-name,
      .game-title {
        margin: 0 0 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.45rem;
        line-height: 1.2;
        color: var(--accent);
      }

      .word-origin,
      .person-dates,
      .meta-line,
      .quote-source {
        color: var(--dim);
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        margin-bottom: 0.7rem;
      }

      .question-list,
      .answer-list {
        display: grid;
        gap: 0.85rem;
      }

      .question-list {
        list-style: none;
        counter-reset: q;
        margin-left: 0;
      }

      .question-card {
        counter-increment: q;
        padding: 0;
        border: 0;
        background: transparent;
        padding-left: var(--leading-inset);
      }

      .question-prompt {
        display: flex;
        gap: 0.9rem;
        align-items: baseline;
        margin-bottom: 0.7rem;
      }

      .question-prompt::before {
        content: counter(q);
        font-family: "Quattro Italic", serif;
        color: var(--accent-dim);
        font-size: 0.85rem;
        min-width: 1rem;
        line-height: 1.78;
      }

      .question-text {
        font-family: "Quattro Italic", serif;
      }

      .answer-card {
        padding: 0;
        border: 0;
        background: transparent;
      }

      .question-actions,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-top: 0;
        margin-left: 1.9rem;
      }

      .pill-button,
      .option-button,
      .secondary-button,
      .primary-button {
        min-height: 2.6rem;
        padding: 0.5rem 0.7rem;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
        cursor: pointer;
      }

      .primary-button,
      .secondary-button {
        width: fit-content;
        min-width: 9.8rem;
      }

      .primary-button {
        background: transparent;
        border-color: var(--border);
      }

      .pill-button.is-active,
      .option-button.is-selected,
      .secondary-button.is-active {
        border-color: var(--accent);
        color: var(--accent);
      }

      .option-button.is-correct {
        border-color: var(--green);
        color: var(--green);
      }

      .option-button.is-incorrect {
        border-color: var(--red);
        color: var(--red);
      }

      .option-button.is-matched {
        border-color: var(--accent);
        background: rgba(196, 169, 110, 0.08);
        color: var(--accent);
      }

      .pill-button:disabled,
      .option-button:disabled,
      .secondary-button:disabled,
      .primary-button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .pill-button:focus-visible,
      .option-button:focus-visible,
      .secondary-button:focus-visible,
      .primary-button:focus-visible,
      .text-input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .question-panel {
        margin-top: 0.8rem;
        margin-left: 1.9rem;
        padding: 0 0 0 1rem;
        border-radius: 0;
        border: 0;
        border-left: 1px solid var(--border);
        background: transparent;
      }
      .answers-box p {
        opacity: 0.55;
      }

      .choice-grid {
        display: grid;
        gap: 0.75rem;
      }

      .choice-grid.two-column {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .option-button {
        width: 100%;
        border-radius: 0;
        text-align: left;
      }

      .option-title {
        display: block;
        margin-bottom: 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.02rem;
        color: inherit;
      }

      .game-shell {
        display: grid;
        gap: 0.9rem;
      }

      .game-prompt {
        margin: 0;
      }

      .game-status,
      .feedback {
        margin: 0;
        min-height: 1.4rem;
        color: var(--dim);
      }

      .feedback.is-success,
      .game-status.is-success {
        color: var(--green);
      }

      .feedback.is-error,
      .game-status.is-error {
        color: var(--red);
      }

      .text-input {
        width: 100%;
        min-height: 2.7rem;
        padding: 0.55rem 0.65rem;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
      }

      .guess-form {
        display: flex;
        gap: 0.85rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .quote-translation { font-style: normal; opacity: 0.9; }

      .mask {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.35rem;
        color: var(--accent);
      }

      .mask span {
        min-width: 0.85rem;
        text-align: center;
      }

      .hint-line,
      .used-letters,
      .match-line {
        color: var(--dim);
        font-size: 0.95rem;
      }

      .primary-button.is-success {
        border-color: var(--green);
        color: var(--green);
      }

      .primary-button.is-error {
        border-color: var(--red);
        color: var(--red);
      }

      .scroll-hint {
        text-align: center;
        color: var(--dim);
        font-size: 0.95rem;
      }

      .spacer {
        height: 4rem;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 640px) {
        .choice-grid.two-column {
          grid-template-columns: 1fr;
        }

        .question-actions,
        .inline-actions {
          margin-left: 1.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <a class="site-link" href="../">Cristian Rus</a>
        <p class="site-kicker">nightly digest</p>
      </header>
      <div id="app" class="stack">
        <section class="card">
          <p>Loading tonight's digest...</p>
        </section>
      </div>
    </main>

    <script>
      const DIGESTS_DIR = new URL("./data/digests/", window.location.href);
      const app = document.getElementById("app");

      document.addEventListener("DOMContentLoaded", init);

      async function init() {
        const today = getTodayDate();

        try {
          const response = await fetch(new URL(`${today}.json`, DIGESTS_DIR), { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Failed to fetch nightly digests.");
          }

          const entry = await response.json();

          if (!entry) {
            renderFallback(today);
            return;
          }

          renderDigest(entry, today);
        } catch (error) {
          console.error(error);
          renderFallback(today);
        }
      }

      function getTodayDate() {
        return new Date().toLocaleDateString("en-CA");
      }

      function renderFallback(dateString) {
        document.title = "Nightly Digest";
        app.innerHTML = `
          <section class="card">
            <p class="date-line">${escapeHtml(formatLongDate(dateString))}</p>
            <h1 class="entry-title">Nightly Digest</h1>
            <p class="entry-subtitle">No digest for today — check back soon.</p>
          </section>
        `;
      }

      function renderDigest(entry, today) {
        const normalized = normalizeEntry(entry, today);
        document.title = `${normalized.title} — Nightly Digest`;

        app.innerHTML = `
          <section class="card">
            <p class="date-line">${escapeHtml(formatLongDate(normalized.date))}</p>
            <h1 class="entry-title">${escapeHtml(normalized.title)}</h1>
            ${renderParagraphs(normalized.essay.paragraphs)}
            <blockquote class="essay-blockquote">
              <p>${escapeHtml(normalized.essay.blockquote)}</p>
            </blockquote>
            <p class="crosslink"><strong>Crosslink</strong> ${escapeHtml(normalized.essay.crosslink)}</p>
          </section>

          <section class="card section-filled">
            <p class="section-label">Today's Number</p>
            <p class="number-value">${escapeHtml(normalized.number.value)}</p>
            <p>${escapeHtml(normalized.number.label)}</p>
          </section>

          <section class="card section-rule prose">
            <p class="section-label">Fragment</p>
            <div class="fragment-rail">
              <p>${escapeHtml(normalized.fragment)}</p>
            </div>
          </section>

          <section class="card section-filled prose">
            <p class="section-label">Word Of The Night</p>
            <h2 class="word-term">${escapeHtml(normalized.word.term)}</h2>
            <p class="word-origin">${escapeHtml(normalized.word.origin)}</p>
            <p>${escapeHtml(normalized.word.definition)}</p>
          </section>

          <section class="card section-rule prose">
            <p class="section-label">Tonight's Voice</p>
            <blockquote class="quote-block">
              <p>${escapeHtml(normalized.quote.text)}</p>
            </blockquote>
            ${normalized.quote.translation ? `<p class="meta-line quote-translation">${escapeHtml(normalized.quote.translation)}</p>` : ""}
            <p class="quote-source">${escapeHtml(normalized.quote.author)} · ${escapeHtml(normalized.quote.source)}</p>
          </section>

          <section class="card section-rule prose">
            <p class="section-label">Person You've Never Heard Of</p>
            <div class="person-block">
              <h2 class="person-name">${escapeHtml(normalized.person.name)}</h2>
              <p class="person-dates">${escapeHtml(normalized.person.dates)}</p>
              ${renderParagraphs(normalized.person.paragraphs)}
            </div>
          </section>

          <section class="card section-rule">
            <p class="section-label">Three Questions</p>
            <ul class="question-list">
              ${renderQuestions(normalized.questions)}
            </ul>
          </section>

          <section class="card section-rule">
            <p class="section-label">Games</p>
          </section>

          <section class="card">
            <div class="word-box interactive-plain">
              <h2 class="game-title">Trivia</h2>
              <p class="game-prompt">${escapeHtml(normalized.trivia.question)}</p>
              <div class="choice-grid" data-trivia-options>
                ${normalized.trivia.options
                  .map(
                    (option, index) => `
                      <button class="option-button" type="button" data-trivia-option="${index}">
                        ${escapeHtml(option)}
                      </button>
                    `
                  )
                  .join("")}
              </div>
              <p class="feedback" data-trivia-feedback aria-live="polite"></p>
              <p class="hint-line" data-trivia-explanation hidden>${escapeHtml(normalized.trivia.explanation)}</p>
            </div>
          </section>

          <section class="card">
            <div class="word-box interactive-plain">
              <div id="nightly-game" class="game-shell">
                ${renderGameMarkup(normalized.game, normalized.date)}
              </div>
            </div>
          </section>

          <section class="card section-rule">
            <p class="section-label">Answers</p>
            <div class="answer-list answers-box interactive-plain">
              ${renderTriviaAnswer(normalized.trivia)}
              ${renderGameAnswer(normalized.game)}
            </div>
          </section>
        `;

        setupQuestionToggles();
        setupTrivia(normalized.trivia);
        setupGame(normalized.game, normalized.date);
      }

      function normalizeEntry(entry, fallbackDate) {
        const essayParagraphs = toStringArray(entry?.essay?.paragraphs, 1, "Tonight's essay is not available yet.");
        const personParagraphs = toStringArray(
          entry?.person?.paragraphs,
          1,
          "This profile will appear once the person notes are available."
        );
        const triviaOptions = toStringArray(entry?.trivia?.options, 4, "Option unavailable.");
        const baseQuestions = Array.isArray(entry?.questions) && entry.questions.length
          ? entry.questions.slice(0, 3).map((item) => ({
              text: safeText(item?.text, "Question unavailable."),
              deeper: safeText(item?.deeper, "No deeper prompt is available yet."),
              experiment: safeText(item?.experiment, "No experiment is available yet.")
            }))
          : [
              {
                text: "Question unavailable.",
                deeper: "No deeper prompt is available yet.",
                experiment: "No experiment is available yet."
              }
            ];
        const questions = [...baseQuestions];

        while (questions.length < 3) {
          questions.push({
            text: "Question unavailable.",
            deeper: "No deeper prompt is available yet.",
            experiment: "No experiment is available yet."
          });
        }

        return {
          date: safeText(entry?.date, fallbackDate),
          title: safeText(entry?.title, "Nightly Digest"),
          essay: {
            paragraphs: essayParagraphs,
            blockquote: safeText(entry?.essay?.blockquote, "The note for tonight is still being prepared."),
            crosslink: safeText(entry?.essay?.crosslink, "Crosslink unavailable.")
          },
          number: {
            value: safeText(entry?.number?.value, "No number yet"),
            label: safeText(entry?.number?.label, "The contextual note for tonight's number is not available yet.")
          },
          fragment: safeText(entry?.fragment, "Tonight's fragment is not available yet."),
          word: {
            term: safeText(entry?.word?.term, "Word unavailable"),
            origin: safeText(entry?.word?.origin, "Origin unavailable."),
            definition: safeText(entry?.word?.definition, "Definition unavailable.")
          },
          quote: {
            text: safeText(entry?.quote?.text, "Quote unavailable."),
            translation: safeNullableText(entry?.quote?.translation),
            author: safeText(entry?.quote?.author, "Unknown author"),
            source: safeText(entry?.quote?.source, "Unknown source")
          },
          person: {
            name: safeText(entry?.person?.name, "Unknown person"),
            dates: safeText(entry?.person?.dates, "Dates unavailable."),
            paragraphs: personParagraphs
          },
          questions,
          trivia: {
            question: safeText(entry?.trivia?.question, "Trivia question unavailable."),
            options: triviaOptions.slice(0, 4),
            correct: Number.isInteger(entry?.trivia?.correct) ? entry.trivia.correct : 0,
            explanation: safeText(entry?.trivia?.explanation, "Explanation unavailable.")
          },
          game: normalizeGame(entry?.game)
        };
      }

      function normalizeGame(game) {
        const type = normalizeGameType(game?.type);
        return {
          type,
          data: game && typeof game.data === "object" ? game.data : {}
        };
      }

      function normalizeGameType(value) {
        const raw = String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[\s-]+/g, "_");

        const aliases = {
          reveal: "reveal",
          two_truths_one_lie: "two_truths_one_lie",
          two_truths_one_lies: "two_truths_one_lie",
          missing_word: "missing_word",
          concept_match: "concept_match",
          letter_by_letter: "letter_by_letter",
          first_and_last: "first_and_last",
          false_cognate: "false_cognate",
          odd_one_out: "odd_one_out"
        };

        return aliases[raw] || "unsupported";
      }

      function renderParagraphs(paragraphs) {
        return paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("");
      }

      function renderQuestions(questions) {
        return questions
          .map(
            (question, index) => `
              <li class="question-card" data-question-card="${index}">
                <div class="question-prompt">
                  <p class="question-text">${escapeHtml(question.text)}</p>
                </div>
                <div class="question-actions">
                  <button class="pill-button" type="button" data-question-toggle="deeper" aria-expanded="false">
                    go deeper
                  </button>
                  <button class="pill-button" type="button" data-question-toggle="experiment" aria-expanded="false">
                    experiment
                  </button>
                </div>
                <div class="question-panel" data-question-panel="deeper" hidden>
                  <p>${escapeHtml(question.deeper)}</p>
                </div>
                <div class="question-panel" data-question-panel="experiment" hidden>
                  <p>${escapeHtml(question.experiment)}</p>
                </div>
              </li>
            `
          )
          .join("");
      }

      function setupQuestionToggles() {
        const cards = app.querySelectorAll("[data-question-card]");
        cards.forEach((card) => {
          const buttons = card.querySelectorAll("[data-question-toggle]");
          const panels = card.querySelectorAll("[data-question-panel]");

          buttons.forEach((button) => {
            button.addEventListener("click", () => {
              const target = button.getAttribute("data-question-toggle");
              const targetPanel = card.querySelector(`[data-question-panel="${target}"]`);
              const isOpen = !targetPanel.hidden;

              panels.forEach((panel) => {
                panel.hidden = true;
              });

              buttons.forEach((item) => {
                item.classList.remove("is-active");

        const clues = toStringArray(data?.clues, 4, "Clue unavailable.");
        return `

      function setupRevealGame(container, data) {
        const clues = toStringArray(data?.clues, 4, "Clue unavailable.");
        const answer = safeText(data?.answer, "");
        const scoreLabels = toStringArray(data?.score_labels, 4, "Complete");
        const list = container.querySelector("[data-reveal-clues]");
        const button = container.querySelector("[data-reveal-more]");
        const form = container.querySelector("[data-reveal-form]");
        const input = container.querySelector("#reveal-guess");
        const status = container.querySelector("[data-reveal-status]");
        const submitButton = form.querySelector("button");
        let clueCount = 1;

        button.addEventListener("click", () => {
          if (clueCount >= clues.length) {
            button.disabled = true;
            return;
          }

          const item = document.createElement("p");
          item.textContent = clues[clueCount];
          list.appendChild(item);
          clueCount += 1;

          if (clueCount >= clues.length) {
            button.disabled = true;
          }
        });

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const guess = normalizeAnswer(input.value);
          const expected = normalizeAnswer(answer);

          if (!guess) {
            setStatus(status, "Enter a guess first.", false);
            return;
          }

          if (guess === expected) {
            const scoreIndex = Math.max(0, Math.min(clueCount - 1, scoreLabels.length - 1));
            setStatus(status, `Correct. ${scoreLabels[scoreIndex]}.`, true);
            setActionButtonState(submitButton, "success");
            submitButton.disabled = true;
            input.disabled = true;
            button.disabled = true;
          } else {
            setStatus(status, "Not quite. Try again or reveal another clue.", false);
            setActionButtonState(submitButton, "error");
          }
        });

        input.addEventListener("input", () => {
          if (!submitButton.disabled) {
            setActionButtonState(submitButton, "idle");
          }
        });
      }

      function setupConceptMatchGame(container, data) {
        const pairs = Array.isArray(data?.pairs) ? data.pairs.slice(0, 4) : [];
        const wordButtons = Array.from(container.querySelectorAll("[data-match-word]"));
        const definitionButtons = Array.from(container.querySelectorAll("[data-match-definition]"));
        const status = container.querySelector("[data-match-status]");
        const progress = container.querySelector("[data-match-progress]");
        let selectedWordId = null;
        let selectedDefinitionId = null;
        let matches = 0;

        wordButtons.forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled) {
              return;
            }

            wordButtons.forEach((item) => item.classList.remove("is-selected"));
            button.classList.add("is-selected");
            selectedWordId = button.getAttribute("data-match-word");
            attemptMatch();
          });
        });

        definitionButtons.forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled) {
              return;
            }

            definitionButtons.forEach((item) => item.classList.remove("is-selected"));
            button.classList.add("is-selected");
            selectedDefinitionId = button.getAttribute("data-match-definition");
            attemptMatch();
          });
        });

        function attemptMatch() {
          if (!selectedWordId || !selectedDefinitionId) {
            return;
          }

          const wordButton = container.querySelector(`[data-match-word="${selectedWordId}"]`);
          const definitionButton = container.querySelector(`[data-match-definition="${selectedDefinitionId}"]`);

          if (selectedWordId === selectedDefinitionId) {
            matches += 1;
            wordButton.disabled = true;
            definitionButton.disabled = true;
            wordButton.className = "option-button is-matched";
            definitionButton.className = "option-button is-matched";
            setStatus(status, "Match made.", true);
            progress.textContent = `Matches made: ${matches}`;

            if (matches === pairs.length) {
              setStatus(status, "All pairs matched.", true);
            }
          } else {
            setStatus(status, "Not a match.", false);
            if (wordButton) {
              wordButton.classList.remove("is-selected");
            }
            if (definitionButton) {
              definitionButton.classList.remove("is-selected");
            }
          }

          selectedWordId = null;
          selectedDefinitionId = null;
        }
      }

      function renderLetterByLetterMarkup(data) {
        const answer = safeText(data?.answer, "");
        return `

            <button class="primary-button" type="submit" data-default-label="Submit">↑ Submit</button>
          </form>
          <p class="used-letters" data-letter-used>Used letters: none</p>

      function setupLetterByLetterGame(container, data) {
        const answer = safeText(data?.answer, "").toUpperCase();
        const maxWrong = Number.isInteger(data?.max_wrong) ? data.max_wrong : 6;
        const successNote = safeNullableText(data?.success_note);
        const mask = container.querySelector("[data-letter-mask]");
        const used = container.querySelector("[data-letter-used]");
        const wrong = container.querySelector("[data-letter-wrong]");
        const status = container.querySelector("[data-letter-status]");
        const form = container.querySelector("[data-letter-form]");
        const input = container.querySelector("#letter-guess");
        const submitButton = form.querySelector("button");
        const guessedLetters = [];
        let wrongCount = 0;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const letter = String(input.value || "").trim().toUpperCase();

          if (!/^[A-ZÀ-ÖØ-Þ]$/i.test(letter)) {
            setStatus(status, "Enter one letter.", false);
            return;
          }

          if (guessedLetters.includes(letter)) {
            setStatus(status, "That letter was already used.", false);
            input.value = "";
            return;
          }

          guessedLetters.push(letter);
          used.textContent = `Used letters: ${guessedLetters.join(", ")}`;

          if (answer.includes(letter)) {
            mask.innerHTML = renderMask(answer, guessedLetters);
            if (!renderMask(answer, guessedLetters).includes("_")) {
              setStatus(status, successNote || "Solved.", true);
              setActionButtonState(submitButton, "success");
              submitButton.disabled = true;
              input.disabled = true;
            } else {
              setStatus(status, "Good letter.", true);
              setActionButtonState(submitButton, "idle");
            }
          } else {
            wrongCount += 1;
            wrong.textContent = `Wrong guesses: ${wrongCount} / ${maxWrong}`;
            if (wrongCount >= maxWrong) {
              setStatus(status, "No more guesses. The answer is below.", false);
              setActionButtonState(submitButton, "error");
              submitButton.disabled = true;
              input.disabled = true;
            } else {
              setStatus(status, "Not in the word.", false);
              setActionButtonState(submitButton, "error");
            }
          }

          input.value = "";
        });
      }

              <article class="answer-card">
                <p class="section-label">Game Answer</p>
                <p><strong>${escapeHtml(stripTrailingPeriod(safeText(game.data?.answer, "Answer unavailable")))}</strong></p>
                <p>${escapeHtml(safeText(game.data?.explanation, "Explanation unavailable."))}</p>
              </article>
            `;
          case "odd_one_out": {
            const odd = (Array.isArray(game.data?.options) ? game.data.options : []).find((item) => item?.is_odd);
            return `
              <article class="answer-card">
                <p class="section-label">Game Answer</p>
                <p><strong>${escapeHtml(stripTrailingPeriod(safeText(odd?.word, "Odd word unavailable")))}</strong></p>
                <p>${escapeHtml(safeText(game.data?.explanation, "Explanation unavailable."))}</p>
              </article>
            `;
          }
          default:
            return `
              <article class="answer-card">
                <p class="section-label">Game Answer</p>
                <p>No answer data is available for tonight's game.</p>
              </article>
            `;
        }
      }

      function renderConceptMatchAnswer(data) {
        const pairs = Array.isArray(data?.pairs) ? data.pairs.slice(0, 4) : [];
        if (!pairs.length) {
          return "<p>No pair data available.</p>";
        }

        return pairs
          .map(
            (pair) => `
              <p><strong>${escapeHtml(stripTrailingPeriod(safeText(pair?.word, "Word unavailable")))}</strong> — ${escapeHtml(
                safeText(pair?.definition, "Definition unavailable.")
              )}</p>
            `
          )
          .join("");
      }

      function renderMask(answer, guessedLetters) {
        return answer
          .toUpperCase()
          .split("")
          .map((character) => {
            if (character === " ") {
              return "<span>&nbsp;</span>";
            }

            return guessedLetters.includes(character)
              ? `<span>${escapeHtml(character)}</span>`
              : "<span>_</span>";
          })
          .join("");
      }

      function renderFirstAndLastMask(answer, displayLength) {
        const length = Number.isInteger(displayLength) ? displayLength : answer.length;
        if (!answer) {
          return "<span>_</span>";
        }

        const first = escapeHtml(answer.charAt(0));
        const last = escapeHtml(answer.charAt(answer.length - 1));
        const middleCount = Math.max(length - 2, 1);

        return [
          `<span>${first}</span>`,
          ...new Array(middleCount).fill("<span>_</span>"),
          `<span>${last}</span>`
        ].join("");
      }

      function seededShuffle(items, seed) {
        let state = seed;
        const values = [...items];

        for (let index = values.length - 1; index > 0; index -= 1) {
          state = (state * 1664525 + 1013904223) & 0xffffffff;
          const swapIndex = Math.abs(state) % (index + 1);
          [values[index], values[swapIndex]] = [values[swapIndex], values[index]];
        }

        return values;
      }

      function buildSeed(dateString) {
        return Number(String(dateString || "").replace(/-/g, "")) || 1;
      }

      function formatLongDate(dateString) {
        const parts = String(dateString).split("-").map((part) => Number(part));
        if (parts.length !== 3 || parts.some(Number.isNaN)) {
          return dateString;
        }

        const date = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
        return date.toLocaleDateString("en-NZ", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      function normalizeAnswer(value) {
        return stripMarks(String(value || ""))
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, "")
          .replace(/\s+/g, " ");
      }

      function stripMarks(value) {
        return value.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }

      function setStatus(element, text, isSuccess) {
        element.textContent = text;
        element.className = isSuccess ? "game-status is-success" : "game-status is-error";
      }

      function setActionButtonState(button, state) {
        if (!button) {
          return;
        }

        const defaultLabel = button.getAttribute("data-default-label") || "Submit";
        button.classList.remove("is-success", "is-error");

        if (state === "success") {
          button.textContent = "✓ Correct";
          button.classList.add("is-success");
          return;
        }

        if (state === "error") {
          button.textContent = "✕ Try again";
          button.classList.add("is-error");
          return;
        }

        button.textContent = `↑ ${defaultLabel}`;
      }

      function safeText(value, fallback) {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      function safeNullableText(value) {
        return typeof value === "string" && value.trim() ? value.trim() : "";
      }

      function stripTrailingPeriod(value) {
        return String(value || "").replace(/\.\s*$/, "").trim();
      }

      function toStringArray(value, fallbackCount, fallbackText) {
        if (!Array.isArray(value) || !value.length) {
          return new Array(Math.max(fallbackCount, 1)).fill(fallbackText);
        }

        return value.map((item) => safeText(item, fallbackText));
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
