<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="Nightly Digest archive.">
    <link rel="icon" type="image/x-icon" href="../../images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="../../images/favicon.ico">
    <title>Nightly Digest Archive</title>
    <style>

      @font-face {
        font-family: "Quattro";
        src: url("../../fonts/Quattro.woff") format("woff");
      }

      @font-face {
        font-family: "Quattro Italic";
        src: url("../../fonts/Quattro-Italic.woff") format("woff");
      }

      :root {
        color-scheme: light dark;
        font-size: 18px;
        --bg: #f6f4ef;
        --surface: #ece9e2;
        --border: #d6d1c5;
        --text: #2b2720;
        --dim: #726a5f;
        --accent: #8b6b2f;
        --accent-dim: #9a8560;
        --green: #2b7a55;
        --red: #b24a3b;
        --quote-text: #3a342a;
        --leading-inset: 0.45rem;
        --radius: 18px;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0d0b;
          --surface: #161510;
          --border: #2a2820;
          --text: #c8c2b4;
          --dim: #6b6560;
          --accent: #c4a96e;
          --accent-dim: #7a6840;
          --green: #7ab090;
          --red: #c07060;
          --quote-text: #ddd5c7;
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        max-width: 680px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 6rem;
        background: var(--bg);
        color: var(--text);
        font-family: "Quattro", serif;
        font-size: 18px;
        line-height: 1.78;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: auto;
        margin: 0;
        padding: 0;
      }

      .masthead {
        display: none;
      }

      .site-link {
        display: inline-block;
        font-family: "Quattro Italic", serif;
        font-size: 1.45rem;
        color: var(--accent);
      }

      .site-kicker {
        margin: 0.3rem 0 0;
        color: var(--dim);
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stack {
        display: block;
      }

      .card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .card + .card {
        margin-top: 2.3rem;
      }

      .section-rule {
        border-top: 1px solid var(--border);
        padding-top: 0.45rem;
      }

      .section-rule > .section-label {
        padding-right: 1.1rem;
      }

      .section-filled {
        background: var(--text);
        border: 1px solid var(--text);
        color: var(--bg);
        padding: 0.45rem 1.1rem 1rem;
      }

      .section-filled .section-label,
      .section-filled .number-value,
      .section-filled .word-term,
      .section-filled .word-origin,
      .section-filled p,
      .section-filled h2 {
        color: inherit;
      }

      .card > :first-child {
        margin-top: 0;
      }

      .card > :last-child {
        margin-bottom: 0;
      }

      .section-label {
        margin: 0 0 0.4rem;
        color: var(--accent-dim);
        font-family: "Quattro Italic", serif;
        font-size: 0.72rem;
        opacity: 0.62;
        text-align: right;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding-right: 0.075rem;
      }

      .answer-card .section-label {
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        text-transform: none;
        text-align: left;
        padding-right: 0;
        margin-bottom: 0.35rem;
      }

      .date-line {
        margin: 0 0 2.5rem;
        color: var(--dim);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .entry-title {
        margin: 0 0 1rem;
        font-family: "Quattro Italic", serif;
        font-size: 2.1rem;
        font-weight: 400;
        color: var(--accent);
        line-height: 1.2;
      }

      .entry-subtitle {
        margin: 0;
        color: var(--dim);
        font-size: 0.9rem;
      }

      .fiction-box,
      .word-box,
      .answers-box {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.3rem 1.5rem;
      }

      .interactive-plain {
        background: transparent;
        border: 0;
        padding: 0;
      }

      .person-block {
        border-left: 0;
        padding-left: 0;
      }

      .prose p {
        margin: 0 0 1rem;
      }

      .essay-blockquote,
      .quote-block {
        margin: 1.8rem 0 1.8rem var(--leading-inset);
        padding: 0.2rem 1.3rem 0.2rem 1.4rem;
        border-left: 4px solid var(--accent-dim);
        color: var(--dim);
        background: transparent;
      }

      .fragment-rail {
        margin: 1.8rem 0 1.8rem var(--leading-inset);
        padding: 0.2rem 1.3rem 0.2rem 1.4rem;
        border-left: 2px solid var(--accent-dim);
        color: var(--dim);
        background: transparent;
      }

      .fragment-rail {
        border-right: 0;
        border-top: 0;
        border-bottom: 0;
      }

      .fragment-rail p {
        font-family: "Quattro Italic", serif;
      }

      .essay-blockquote p,
      .quote-block p {
        margin: 0;
        font-family: "Quattro Italic", serif;
      }

      .crosslink {
        margin-top: 1rem;
        padding-top: 0.9rem;
        border-top: 1px solid rgba(196, 169, 110, 0.15);
        color: var(--dim);
      }

      .crosslink strong {
        color: var(--accent);
        font-weight: 600;
      }

      .number-value {
        margin: 0 0 0.45rem;
        font-family: "Quattro Italic", serif;
        font-size: 3.1rem;
        line-height: 1;
        color: var(--accent);
      }

      .word-term {
        margin: 0 0 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 3.1rem;
        line-height: 1;
        color: var(--accent);
      }

      .person-name,
      .game-title {
        margin: 0 0 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.45rem;
        line-height: 1.2;
        color: var(--accent);
      }

      .word-origin,
      .person-dates,
      .meta-line,
      .quote-source {
        color: var(--dim);
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        margin-bottom: 0.7rem;
      }

      .question-list,
      .answer-list {
        display: grid;
        gap: 0.85rem;
      }

      .question-list {
        list-style: none;
        counter-reset: q;
        margin-left: 0;
        padding-left: 0;
      }

      .question-card {
        counter-increment: q;
        padding: 0;
        border: 0;
        background: transparent;
        padding-left: var(--leading-inset);
      }

      .question-prompt {
        display: flex;
        gap: 0.9rem;
        align-items: baseline;
        margin-bottom: 0.7rem;
      }

      .question-prompt::before {
        content: counter(q);
        font-family: "Quattro Italic", serif;
        color: var(--accent-dim);
        font-size: 0.85rem;
        min-width: 1rem;
        line-height: 1.78;
      }

      .question-text {
        font-family: "Quattro Italic", serif;
      }

      .answer-card {
        padding: 0;
        border: 0;
        background: transparent;
      }

      .question-actions,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-top: 0;
        margin-left: 1.9rem;
      }

      .pill-button,
      .option-button,
      .secondary-button,
      .primary-button {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-height: 2.6rem;
        padding: 0.5rem 0.7rem;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
        cursor: pointer;
      }

      .primary-button,
      .secondary-button {
        width: fit-content;
        min-width: 9.8rem;
      }

      .primary-button {
        background: transparent;
        border-color: var(--border);
      }

      .pill-button.is-active,
      .option-button.is-selected,
      .secondary-button.is-active {
        border-color: var(--accent);
        color: var(--accent);
      }

      .option-button.is-correct {
        border-color: var(--green);
        color: var(--green);
      }

      .option-button.is-incorrect {
        border-color: var(--red);
        color: var(--red);
      }

      .option-button.is-matched {
        border-color: var(--accent);
        background: rgba(196, 169, 110, 0.08);
        color: var(--accent);
      }

      .pill-button:disabled,
      .option-button:disabled,
      .secondary-button:disabled,
      .primary-button:disabled {
        cursor: default;
      }

      .pill-button:focus-visible,
      .option-button:focus-visible,
      .secondary-button:focus-visible,
      .primary-button:focus-visible,
      .text-input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .question-panel {
        margin-top: 0.8rem;
        margin-left: 1.9rem;
        padding: 0 0 0 1rem;
        border-radius: 0;
        border: 0;
        border-left: 1px solid var(--border);
        background: transparent;
      }

      .button-marker {
        display: inline-block;
        min-width: 0.65rem;
        color: var(--accent-dim);
      }

      .choice-grid {
        display: grid;
        gap: 0.75rem;
      }

      .choice-grid.two-column {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .option-button {
        width: 100%;
        border-radius: 0;
        text-align: left;
      }

      .option-title {
        display: block;
        margin-bottom: 0.2rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.02rem;
        color: inherit;
      }

      .game-shell {
        display: grid;
        gap: 0.9rem;
      }

      .game-prompt {
        margin: 0;
      }

      .game-status,
      .feedback {
        margin: 0;
        min-height: 1.4rem;
        color: var(--dim);
      }

      .feedback.is-success,
      .game-status.is-success {
        color: var(--green);
      }

      .feedback.is-error,
      .game-status.is-error {
        color: var(--red);
      }

      .text-input {
        width: 100%;
        min-height: 2.7rem;
        padding: 0.55rem 0.65rem;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
      }

      .guess-form {
        display: flex;
        gap: 0.85rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .quote-translation {
        font-style: normal;
      }

      .mask {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        font-family: "Quattro Italic", serif;
        font-size: 1.35rem;
        color: var(--accent);
      }

      .mask span {
        min-width: 0.85rem;
        text-align: center;
      }

      .hint-line,
      .used-letters,
      .match-line {
        color: var(--dim);
        font-size: 0.95rem;
      }

      .primary-button.is-success {
        border-color: var(--green);
        color: var(--green);
      }

      .primary-button.is-error {
        border-color: var(--red);
        color: var(--red);
      }

      .scroll-hint {
        text-align: center;
        color: var(--dim);
        font-size: 0.95rem;
      }

      .spacer {
        height: 4rem;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 640px) {
        .choice-grid.two-column {
          grid-template-columns: 1fr;
        }

        .question-actions,
        .inline-actions {
          margin-left: 1.9rem;
        }
      }

    </style>
  </head>
  <body>
    <main class="page">
      <div class="stack">
        <section class="card">
          <p class="date-line">Nightly Archive</p>
          <h1 class="entry-title">Every available digest</h1>
          <p class="entry-subtitle"><a href="../index.html">Back to today launcher</a></p>
        </section>
        <section class="card section-rule">
          <ul class="question-list">
        <li class="question-card">
          <div class="question-prompt">
            <p class="question-text"><a href="./2026-05-07.html">The Slow Intelligence of Rot</a></p>
          </div>
          <p class="person-dates" style="margin-left:1.9rem;">Thursday, 7 May 2026</p>
        </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
