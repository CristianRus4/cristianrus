<!DOCTYPE html>
<html lang="en">
	<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<meta name="description" content="Cristian Rus — digital designer and iOS developer based in Wellington, New Zealand.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://www.cristianrus.me/">
	<meta property="og:title" content="Cristian Rus">
	<meta property="og:description" content="Cristian Rus — digital designer and iOS developer based in Wellington, New Zealand.">
	<meta property="og:image" content="https://www.cristianrus.me/images/avatar.jpg">
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
	<link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico"/>
	<title>Cristian Rus</title>
	</head>

	<body>

<div class="header">
  <a class="avatar-link" href="/" aria-label="Home">
    <img class="avatar" src="images/avatar.jpg" alt="Cristian Rus avatar"/>
  </a>
  <div class="header-text">
    <h1 class="title"><a class="titlelink" href="/">Cristian Rus</a></h1>
    <p class="sub">design & human behaviour</p>
  </div>
</div>

  <div class="button-container">
  <div class="section-label">about</div>
  <div class="extra-buttons">
    <button class="extra-button"><a href="about">me</a></button>
    <button class="extra-button"><a href="now">now</a></button>
  </div>
  </div>

  <div class="button-container">
  <div class="section-label">apps</div>
  <div class="extra-buttons">
    <button class="extra-button"><a href="/apps/left">Left</a></button>
    <button class="extra-button"><a href="/apps/ftnss">ftnss</a></button>
    <button class="extra-button"><a href="/apps/txtpod">txtpod</a></button>
    <button id="apps-ellipsis" class="extra-button" aria-expanded="false">···</button>
  </div>
  <div id="more-apps" style="display:none;">
    <div class="extra-buttons">
      <button class="extra-button"><a href="/apps/bites">Bites</a></button>
      <button class="extra-button"><a href="/apps/notsobusy">NotSoBusy</a></button>
    </div>
    <div class="extra-buttons">
      <button class="extra-button"><a href="/apps/kiwicamping">KiwiCamping</a></button>
      <button class="extra-button"><a href="/apps/ftnss-workouts">ftnss Workouts</a></button>
    </div>
  </div>
  </div>

  <div class="button-container">
  <div class="section-label">contact</div>
  <div class="extra-buttons">
    <button class="extra-button"><a id="copy-email" href="#">mail</a></button>
    <button class="extra-button"><a href="sms:+642041926150">text</a></button>
    <button class="extra-button"><a href="twitter">x</a></button>
  </div>
  </div>

  <script type="text/javascript">
  const copyEmail = document.getElementById('copy-email');
  copyEmail.addEventListener('click', function() {
    navigator.clipboard.writeText('cristianrus@hey.com');
    this.textContent = 'address copied';
    setTimeout(() => {
      this.textContent = 'mail';
    }, 1000);
  });
  // Reveal extra apps when tapping the ellipsis and hide the ellipsis
  const appsEllipsis = document.getElementById('apps-ellipsis');
  const moreApps = document.getElementById('more-apps');
  if (appsEllipsis && moreApps) {
    appsEllipsis.addEventListener('click', function() {
      moreApps.style.display = 'block';
      appsEllipsis.style.display = 'none';
      appsEllipsis.setAttribute('aria-expanded', 'true');
    });
  }
  </script>

	</body>

</html>
