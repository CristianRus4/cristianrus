<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="stylesheet" type="text/css" href="style.css">
<link rel="shortcut icon" type="image/png" href="images/favicon.png"/>
<title>strava workouts</title>
</head>
<body>

  <h1 class="title"><a class="titlelink" href="/">Cristian Rus</a></h1>
  <p class="sub">strava workouts</p>

  <p id="status"></p>
  <p id="connect" style="display:none;"></p>

  <div id="list"></div>

<script src="strava.js"></script>
<script>
(function () {
  const statusEl  = document.getElementById("status");
  const connectEl = document.getElementById("connect");
  const listEl    = document.getElementById("list");

  /* ---------- formatters ---------- */
  const km = (m) => m == null ? "—" : (m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m");
  function dur(s) {
    if (s == null) return "—";
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.round(s % 60);
    return (h ? h + "h " : "") + (m || h ? m + "m " : "") + sec + "s";
  }
  function pace(mps, type) {
    if (!mps) return "—";
    if (/Ride|Cycl|EBike|Velo|Handcycle/i.test(type || "")) return (mps * 3.6).toFixed(1) + " km/h";
    const spk = 1000 / mps, mm = Math.floor(spk / 60), ss = Math.round(spk % 60);
    return mm + ":" + String(ss).padStart(2, "0") + " /km";
  }
  const speed = (mps) => mps == null ? "—" : (mps * 3.6).toFixed(1) + " km/h";
  const elev  = (m) => m == null ? "—" : Math.round(m) + " m";
  const date  = (iso) => iso ? new Date(iso).toLocaleString(undefined,
    { weekday: "short", year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
  const esc   = (s) => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function row(k, v) {
    if (v === undefined || v === null || v === "" || (typeof v === "number" && isNaN(v))) return "";
    return `<tr><th>${k}</th><td>${v}</td></tr>`;
  }

  /* ---------- detail table (every field Strava returns) ---------- */
  function detailTable(a) {
    const loc = [a.location_city, a.location_state, a.location_country].filter(Boolean).join(", ");
    const map = a.map && (a.map.polyline || a.map.summary_polyline);
    let html = "";
    if (map) {
      const src = "https://staticmap.openstreetmap.de/staticmap.php?size=640x280&path=color:0x555555|weight:4|" +
                  encodeURIComponent("enc:" + map);
      html += `<img class="map" alt="route" src="${src}" onerror="this.style.display='none'">`;
    }
    html += "<table>";
    // Overview
    html += row("type", a.sport_type || a.type);
    html += row("workout type", a.workout_type);
    html += row("distance", km(a.distance));
    html += row("moving time", dur(a.moving_time));
    html += row("elapsed time", dur(a.elapsed_time));
    html += row("start (local)", date(a.start_date_local));
    html += row("start (utc)", date(a.start_date));
    html += row("timezone", a.timezone);
    html += row("location", loc);
    html += row("start lat/lng", a.start_latlng && a.start_latlng.length ? a.start_latlng.map(n => n.toFixed(5)).join(", ") : null);
    html += row("end lat/lng", a.end_latlng && a.end_latlng.length ? a.end_latlng.map(n => n.toFixed(5)).join(", ") : null);
    // Performance
    html += row("avg speed", speed(a.average_speed));
    html += row("max speed", speed(a.max_speed));
    html += row("avg pace", pace(a.average_speed, a.sport_type || a.type));
    html += row("avg cadence", a.average_cadence);
    html += row("avg power", a.average_watts != null ? a.average_watts + " W" : null);
    html += row("weighted power", a.weighted_average_watts != null ? a.weighted_average_watts + " W" : null);
    html += row("max power", a.max_watts != null ? a.max_watts + " W" : null);
    html += row("energy", a.kilojoules != null ? a.kilojoules + " kJ" : null);
    html += row("calories", a.calories);
    html += row("avg temp", a.average_temp != null ? a.average_temp + " °C" : null);
    // Heart rate / effort / elevation
    html += row("avg heart rate", a.average_heartrate != null ? a.average_heartrate + " bpm" : null);
    html += row("max heart rate", a.max_heartrate != null ? a.max_heartrate + " bpm" : null);
    html += row("suffer score", a.suffer_score);
    html += row("perceived exertion", a.perceived_exertion);
    html += row("elevation gain", elev(a.total_elevation_gain));
    html += row("elevation high", elev(a.elev_high));
    html += row("elevation low", elev(a.elev_low));
    // Social
    html += row("kudos", a.kudos_count);
    html += row("comments", a.comment_count);
    html += row("athletes", a.athlete_count);
    html += row("photos", a.total_photo_count != null ? a.total_photo_count : a.photo_count);
    html += row("achievements", a.achievement_count);
    html += row("PRs", a.pr_count);
    html += row("segment efforts", a.segment_efforts ? a.segment_efforts.length : null);
    html += row("best efforts", a.best_efforts ? a.best_efforts.length : null);
    // Gear / device / flags
    html += row("gear", a.gear && a.gear.name);
    html += row("device", a.device_name);
    html += row("commute", a.commute ? "yes" : null);
    html += row("trainer", a.trainer ? "yes" : null);
    html += row("manual", a.manual ? "yes" : null);
    html += row("private", a.private ? "yes" : null);
    html += row("description", a.description ? esc(a.description) : null);
    html += row("activity id", a.id);
    html += row("link", `<a href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">open on Strava</a>`);
    html += "</table>";
    return html;
  }

  /* ---------- one workout (collapsed; details fetched on expand) ---------- */
  function workoutEl(a) {
    const det = document.createElement("details");
    det.className = "workout item";
    det.innerHTML =
      `<summary>` +
        `<span class="tit">${esc(a.name || "(untitled)")}</span><br>` +
        `<span class="meta">${esc(a.sport_type || a.type)} · ${date(a.start_date_local || a.start_date)} · ` +
        `${km(a.distance)} · ${dur(a.moving_time)} · ${pace(a.average_speed, a.sport_type || a.type)}</span>` +
      `</summary>` +
      `<div class="body"></div>`;
    const body = det.querySelector(".body");
    let loaded = false;
    det.addEventListener("toggle", async () => {
      if (!det.open || loaded) return;
      loaded = true;
      body.innerHTML = `<p class="meta">loading…</p>`;
      try {
        const full = await Strava.getActivity(a.id);
        body.innerHTML = detailTable(full);
      } catch (e) {
        body.innerHTML = detailTable(a) + `<p class="meta">(summary only — ${esc(e.message)})</p>`;
      }
    });
    return det;
  }

  /* ---------- boot ---------- */
  function showConnect(extra) {
    connectEl.style.display = "block";
    connectEl.innerHTML =
      (extra ? extra + "<br>" : "") +
      `<a href="${Strava.authorizeUrl()}">Connect with Strava →</a>`;
  }

  async function load() {
    statusEl.textContent = "loading…";
    try {
      const list = await Strava.getActivities(20);
      if (!Array.isArray(list) || list.length === 0) {
        statusEl.textContent = "Connected, but no activities were returned.";
        return;
      }
      const totDist = list.reduce((a, x) => a + (x.distance || 0), 0);
      const totTime = list.reduce((a, x) => a + (x.moving_time || 0), 0);
      statusEl.textContent =
        `${list.length} workouts · ${(totDist / 1000).toFixed(1)} km · ${dur(totTime)} total`;
      listEl.innerHTML = "";
      list.forEach(a => listEl.appendChild(workoutEl(a)));
    } catch (e) {
      const msg = e.message || String(e);
      if (/scope|activity:read|authoriz/i.test(msg)) {
        statusEl.textContent = "Your authorization is missing the activity:read scope.";
        showConnect("Re-authorize to read your activities:");
      } else {
        statusEl.textContent = "Couldn't load activities: " + msg;
      }
    }
  }

  async function main() {
    try {
      await Strava.init(); // completes OAuth if we returned with ?code=
    } catch (e) {
      statusEl.textContent = e.message;
    }
    if (!Strava.isConnected()) {
      statusEl.textContent = "Not connected to Strava yet.";
      showConnect();
      return;
    }
    load();
  }

  main();
})();
</script>

</body>
</html>
