<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="stylesheet" type="text/css" href="style.css">
<link rel="shortcut icon" type="image/png" href="images/favicon.png"/>
<title>active</title>
</head>
<body>

  <h1 class="title"><a class="titlelink" href="/">Cristian Rus</a></h1>
  <p class="sub">active</p>

  <p id="status"></p>
  <p id="connect" style="display:none;"></p>

  <div id="dash" style="display:none;">
    <div class="filters" id="filters">
      <button data-range="week">this week</button>
      <button data-range="month">this month</button>
      <button data-range="90d">last 90 days</button>
      <button data-range="year" class="on">this year</button>
      <button data-range="all">all time</button>
    </div>

    <div class="stats" id="stats"></div>

    <h2>workout pattern</h2>
    <div class="bars" id="dow"></div>

    <h2>distribution by type</h2>
    <div class="bars" id="types"></div>

    <div id="totals-wrap" style="display:none;">
      <h2>career totals</h2>
      <div id="totals"></div>
    </div>

    <div id="zones-wrap" style="display:none;">
      <h2>my zones</h2>
      <div id="athlete-zones"></div>
    </div>

    <h2>latest workouts</h2>
    <div id="list"></div>
  </div>

<script src="strava.js"></script>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status"), connectEl = $("connect"), dashEl = $("dash");
  const statsEl = $("stats"), dowEl = $("dow"), typesEl = $("types"), listEl = $("list"), filtersEl = $("filters");

  let ALL = [], range = "year", enrichGen = 0;

  /* ---------- formatters ---------- */
  const kmRaw = (m) => m / 1000;
  const km = (m) => m == null ? "—" : (m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m");
  function dur(s) {
    if (s == null) return "—";
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.round(s % 60);
    return (h ? h + "h " : "") + (m || h ? m + "m " : "") + sec + "s";
  }
  function durShort(s) { const min = Math.round(s / 60), h = Math.floor(min / 60), m = min % 60; return h ? `${h}h ${m}m` : `${m}m`; }
  // Normalize Strava sport types into short, friendly labels.
  function niceType(t) {
    if (!t) return "Other";
    if (/strength|weight\s*training|weighttraining|workout/i.test(t)) return "Strength";
    return t.replace(/([a-z])([A-Z])/g, "$1 $2"); // VirtualRun -> Virtual Run
  }
  function clock(s) { // m:ss or h:mm:ss for laps/efforts
    s = Math.round(s); const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(sec).padStart(2, "0");
  }
  function pace(mps, type) {
    if (!mps) return "—";
    if (/Ride|Cycl|EBike|Velo|Handcycle/i.test(type || "")) return (mps * 3.6).toFixed(1) + " km/h";
    const spk = 1000 / mps, mm = Math.floor(spk / 60), ss = Math.round(spk % 60);
    return mm + ":" + String(ss).padStart(2, "0") + " /km";
  }
  const speed = (mps) => mps == null ? "—" : (mps * 3.6).toFixed(1) + " km/h";
  const elev = (m) => m == null ? "—" : Math.round(m) + " m";
  const dt = (iso) => iso ? new Date(iso).toLocaleString(undefined,
    { weekday: "short", year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
  const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  /* ---------- filtering ---------- */
  function rangeStart(r) {
    const now = new Date();
    if (r === "week") { const d = new Date(now), day = (d.getDay() + 6) % 7; d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - day); return d; }
    if (r === "month") return new Date(now.getFullYear(), now.getMonth(), 1);
    if (r === "90d") { const d = new Date(now); d.setDate(d.getDate() - 90); return d; }
    if (r === "year") return new Date(now.getFullYear(), 0, 1);
    return new Date(0);
  }
  const filtered = () => { const s = rangeStart(range); return ALL.filter(a => new Date(a.start_date_local || a.start_date) >= s); };
  const rangeLabel = (r) => ({ week: "this week", month: "this month", "90d": "last 90 days", year: "this year", all: "all time" }[r]);

  /* ---------- bar chart helper ---------- */
  function barRows(container, entries, fmtVal, cls) {
    const max = Math.max(1, ...entries.map(e => e.value));
    container.innerHTML = entries.map(e => `
      <div class="bar-row">
        <span class="lab">${e.label}</span>
        <span class="bar-track"><span class="${cls || "bar-fill"} ${e.cls || ""}" style="width:${(e.value / max * 100).toFixed(1)}%"></span></span>
        <span class="val">${fmtVal(e)}</span>
      </div>`).join("");
  }

  /* ---------- headline stats ---------- */
  function renderStats(list) {
    const dist = list.reduce((s, a) => s + (a.distance || 0), 0);
    const time = list.reduce((s, a) => s + (a.moving_time || 0), 0);
    const gain = list.reduce((s, a) => s + (a.total_elevation_gain || 0), 0);
    const kcal = list.reduce((s, a) => { const d = Strava.getCachedDetail(a.id); return s + (d && d.calories ? d.calories : 0); }, 0);
    const activeDays = new Set(list.map(a => (a.start_date_local || a.start_date || "").slice(0, 10))).size;
    statsEl.innerHTML = [
      [list.length, "sessions"],
      [kmRaw(dist).toFixed(1) + " km", "distance"],
      [durShort(time), "moving time"],
      [Math.round(gain) + " m", "elevation"],
      [kcal ? Math.round(kcal).toLocaleString() : "—", `kcal <span id="enrich"></span>`],
      [activeDays, "active days"],
    ].map(([n, l]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  }

  function renderDow(list) {
    const names = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"], counts = [0, 0, 0, 0, 0, 0, 0];
    list.forEach(a => counts[(new Date(a.start_date_local || a.start_date).getDay() + 6) % 7]++);
    const max = Math.max(1, ...counts);
    dowEl.className = "heatmap";
    // Translucent fill via rgba alpha (not CSS opacity) so the label stays fully readable.
    dowEl.innerHTML = names.map((n, i) => {
      const a = counts[i] ? (0.15 + 0.85 * (counts[i] / max)) : 0.05;
      return `<div class="cell"><span class="box" style="--fill:${a.toFixed(2)}" title="${counts[i]} workouts">${n}</span></div>`;
    }).join("");
  }
  function renderTypes(list) {
    const m = {};
    list.forEach(a => { const t = niceType(a.sport_type || a.type); m[t] = (m[t] || 0) + 1; });
    barRows(typesEl, Object.entries(m).map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value), e => e.value);
  }

  /* ---------- career totals (athlete stats) ---------- */
  async function renderTotals() {
    try {
      const s = await Strava.getAthleteStats();
      const block = (title, t) => !t || !t.count ? "" :
        `<tr><th>${title}</th><td>${t.count}</td><td>${kmRaw(t.distance).toFixed(0)} km</td><td>${durShort(t.moving_time)}</td><td>${elev(t.elevation_gain)}</td></tr>`;
      let rows = "";
      [["Run", "run"], ["Ride", "ride"], ["Swim", "swim"]].forEach(([label, k]) => {
        rows += block(`${label} · 4wk`, s[`recent_${k}_totals`]);
        rows += block(`${label} · YTD`, s[`ytd_${k}_totals`]);
        rows += block(`${label} · all`, s[`all_${k}_totals`]);
      });
      if (!rows) return;
      let recs = "";
      if (s.biggest_ride_distance) recs += `<tr><th>biggest ride</th><td colspan="4">${kmRaw(s.biggest_ride_distance).toFixed(1)} km</td></tr>`;
      if (s.biggest_climb_elevation_gain) recs += `<tr><th>biggest climb</th><td colspan="4">${elev(s.biggest_climb_elevation_gain)}</td></tr>`;
      $("totals").innerHTML =
        `<table class="wtable"><thead><tr><th></th><th>count</th><th>distance</th><th>time</th><th>elev</th></tr></thead><tbody>${rows}${recs}</tbody></table>`;
      $("totals-wrap").style.display = "block";
    } catch (e) { /* stats unavailable */ }
  }

  /* ---------- athlete zones ---------- */
  async function renderAthleteZones() {
    try {
      const z = await Strava.getAthleteZones();
      const fmtZones = (zones, unit) => zones.map((zn, i) =>
        `Z${i + 1} ${zn.min}${zn.max > 0 ? "–" + zn.max : "+"} ${unit}`).join(" · ");
      let html = "";
      if (z.heart_rate && z.heart_rate.zones) html += `<p><strong>heart rate</strong><br>${fmtZones(z.heart_rate.zones, "bpm")}</p>`;
      if (z.power && z.power.zones) html += `<p><strong>power</strong><br>${fmtZones(z.power.zones, "W")}</p>`;
      if (!html) return;
      $("athlete-zones").innerHTML = html;
      $("zones-wrap").style.display = "block";
    } catch (e) { /* zones not configured */ }
  }

  /* ---------- per-workout detail building blocks ---------- */
  function detailTable(a) {
    const loc = [a.location_city, a.location_state, a.location_country].filter(Boolean).join(", ");
    const map = a.map && (a.map.polyline || a.map.summary_polyline);
    // Skip empty values AND placeholder dashes so nothing shows "—".
    const r = (k, v) => (v === undefined || v === null || v === "" || v === "—" || (typeof v === "number" && isNaN(v))) ? "" : `<tr><th>${k}</th><td>${v}</td></tr>`;
    let html = "";
    if (map) html += `<img class="map" alt="route" src="https://staticmap.openstreetmap.de/staticmap.php?size=640x280&path=color:0x555555|weight:4|${encodeURIComponent("enc:" + map)}" onerror="this.style.display='none'">`;
    html += "<table>";
    html += r("type", niceType(a.sport_type || a.type)) + r("workout type", a.workout_type);
    html += r("distance", a.distance > 0 ? km(a.distance) : null) + r("moving time", dur(a.moving_time)) + r("elapsed time", dur(a.elapsed_time));
    // Commented out per request — kept for reference:
    // html += r("start (local)", dt(a.start_date_local)) + r("start (utc)", dt(a.start_date)) + r("timezone", a.timezone);
    html += r("location", loc);
    html += r("start lat/lng", a.start_latlng && a.start_latlng.length ? a.start_latlng.map(n => n.toFixed(5)).join(", ") : null);
    html += r("end lat/lng", a.end_latlng && a.end_latlng.length ? a.end_latlng.map(n => n.toFixed(5)).join(", ") : null);
    html += r("avg speed", a.average_speed ? speed(a.average_speed) : null) + r("max speed", a.max_speed ? speed(a.max_speed) : null) + r("avg pace", a.average_speed ? pace(a.average_speed, a.sport_type || a.type) : null);
    html += r("avg cadence", a.average_cadence);
    html += r("avg power", a.average_watts != null ? a.average_watts + " W" : null) + r("weighted power", a.weighted_average_watts != null ? a.weighted_average_watts + " W" : null) + r("max power", a.max_watts != null ? a.max_watts + " W" : null);
    html += r("energy", a.kilojoules != null ? a.kilojoules + " kJ" : null) + r("calories", a.calories) + r("avg temp", a.average_temp != null ? a.average_temp + " °C" : null);
    html += r("avg heart rate", a.average_heartrate != null ? a.average_heartrate + " bpm" : null) + r("max heart rate", a.max_heartrate != null ? a.max_heartrate + " bpm" : null);
    html += r("suffer score", a.suffer_score) + r("perceived exertion", a.perceived_exertion);
    html += r("elevation gain", a.total_elevation_gain ? elev(a.total_elevation_gain) : null) + r("elevation high", a.elev_high ? elev(a.elev_high) : null) + r("elevation low", a.elev_low ? elev(a.elev_low) : null);
    // Commented out per request — kept for reference:
    // html += r("kudos", a.kudos_count) + r("comments", a.comment_count) + r("athletes", a.athlete_count) + r("photos", a.total_photo_count != null ? a.total_photo_count : a.photo_count);
    // html += r("achievements", a.achievement_count) + r("PRs", a.pr_count);
    html += r("gear", a.gear && a.gear.name) + r("device", a.device_name);
    html += r("commute", a.commute ? "yes" : null) /* + r("trainer", a.trainer ? "yes" : null) */ + r("manual", a.manual ? "yes" : null) + r("private", a.private ? "yes" : null);
    html += r("description", a.description ? esc(a.description) : null);
    // Commented out per request — kept for reference:
    // html += r("activity id", a.id) + r("link", `<a href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">open on Strava</a>`);
    // "streams" label row only; the charts render full-width just below the table.
    html += `<tr class="streams-row" style="display:none"><th>streams</th><td></td></tr>`;
    html += "</table>";
    return html;
  }

  // Downsample to ~n points (bucket average) for a clean sparkline.
  function downsample(vals, n) {
    const v = vals.filter(x => x != null);
    if (v.length <= n) return v;
    const out = [], step = v.length / n;
    for (let i = 0; i < n; i++) {
      const a = Math.floor(i * step), b = Math.floor((i + 1) * step);
      let sum = 0, c = 0; for (let j = a; j < b; j++) { sum += v[j]; c++; }
      out.push(c ? sum / c : v[a]);
    }
    return out;
  }
  function sparkline(vals) {
    const pts = downsample(vals, 240);
    if (pts.length < 2) return "";
    const min = Math.min(...pts), max = Math.max(...pts), rng = (max - min) || 1, W = 1000, H = 100;
    const xy = pts.map((v, i) => [(i / (pts.length - 1)) * W, H - ((v - min) / rng) * H]);
    const line = xy.map(([x, y], i) => (i ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
    const area = `M0 ${H} ` + xy.map(([x, y]) => "L" + x.toFixed(1) + " " + y.toFixed(1)).join(" ") + ` L${W} ${H} Z`;
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path class="area" d="${area}"/><path d="${line}"/></svg>`;
  }
  function renderStreams(streams) {
    const specs = [
      { key: "heartrate", label: "heart rate", unit: "bpm", fmt: v => Math.round(v) },
      { key: "altitude", label: "elevation", unit: "m", fmt: v => Math.round(v) },
      { key: "velocity_smooth", label: "speed", unit: "km/h", map: v => v * 3.6, fmt: v => v.toFixed(1) },
      { key: "watts", label: "power", unit: "W", fmt: v => Math.round(v) },
      { key: "cadence", label: "cadence", unit: "rpm", fmt: v => Math.round(v) },
    ];
    let html = "";
    specs.forEach(s => {
      const stream = streams[s.key];
      if (!stream || !stream.data || !stream.data.length) return;
      const data = s.map ? stream.data.map(s.map) : stream.data;
      const valid = data.filter(v => v != null);
      if (!valid.length) return;
      const mn = Math.min(...valid), mx = Math.max(...valid);
      if (mn === mx) return; // flat line (e.g. elevation 0–0) — no useful chart
      const chart = sparkline(data);
      if (!chart) return; // not enough points to draw
      html += `<div class="spark-wrap"><div class="cap"><span>${s.label}</span><span>${s.fmt(mn)}–${s.fmt(mx)} ${s.unit}</span></div>${chart}</div>`;
    });
    return html; // empty string if no charts — caller hides the row
  }
  function renderZones(zones) {
    if (!Array.isArray(zones) || !zones.length) return "";
    let html = "";
    zones.forEach(z => {
      const buckets = z.distribution_buckets || [];
      if (!buckets.length) return;
      const total = buckets.reduce((s, b) => s + (b.time || 0), 0) || 1;
      const entries = buckets.map((b, i) => ({
        label: "Z" + (i + 1), value: b.time || 0, cls: "zone-z" + Math.min(5, i + 1),
        pct: (b.time || 0) / total * 100,
      }));
      html += `<h3>${z.type === "heartrate" ? "heart-rate" : z.type} zones</h3><div class="bars">`;
      const wrap = document.createElement("div");
      barRows(wrap, entries, e => durShort(e.value) + " · " + e.pct.toFixed(0) + "%", "zone-fill");
      html += wrap.innerHTML + `</div>`;
    });
    return html;
  }
  function renderLaps(laps) {
    if (!Array.isArray(laps) || laps.length < 2) return "";
    let rows = laps.map(l =>
      `<tr><td>${l.lap_index}</td><td>${km(l.distance)}</td><td>${clock(l.moving_time)}</td>` +
      `<td>${pace(l.average_speed, l.type)}</td><td>${l.average_heartrate ? Math.round(l.average_heartrate) : "—"}</td></tr>`).join("");
    return `<h3>laps</h3><table class="wtable"><thead><tr><th>#</th><th>dist</th><th>time</th><th>pace</th><th>hr</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  function renderEfforts(title, efforts) {
    if (!Array.isArray(efforts) || !efforts.length) return "";
    let rows = efforts.map(e => {
      const pr = e.pr_rank === 1;
      return `<tr class="${pr ? "pr" : ""}"><td>${esc((e.segment && e.segment.name) || e.name || "")}${pr ? " · PR" : ""}</td>` +
        `<td>${e.distance ? km(e.distance) : "—"}</td><td>${clock(e.elapsed_time)}</td>` +
        `<td>${e.average_heartrate ? Math.round(e.average_heartrate) + " bpm" : "—"}</td></tr>`;
    }).join("");
    return `<h3>${title}</h3><table class="wtable"><thead><tr><th>name</th><th>dist</th><th>time</th><th>hr</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  function workoutEl(a) {
    const det = document.createElement("details");
    det.className = "workout item";
    const wdate = new Date(a.start_date_local || a.start_date)
      .toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    // Build the details line from only the parts we actually have.
    const parts = [];
    if (a.distance > 0) parts.push(km(a.distance));
    if (a.moving_time) parts.push(durShort(a.moving_time));
    if (a.average_speed) parts.push(pace(a.average_speed, a.sport_type || a.type));
    det.innerHTML =
      `<summary>` +
        `<span class="wdate">${wdate}</span>` +
        `<span class="tit">${esc(a.name || "(untitled)")}</span>` +
        (parts.length ? `<span class="meta">${parts.join(" · ")}</span>` : "") +
      `</summary><div class="body"></div>`;
    const body = det.querySelector(".body");
    let loaded = false;
    det.addEventListener("toggle", async () => {
      if (!det.open || loaded) return;
      loaded = true;
      body.innerHTML = `<p class="meta">loading…</p>`;
      let full = a;
      try { full = await Strava.getActivityCached(a.id); } catch (e) {}
      body.innerHTML = detailTable(full)
        + `<div class="streams-below"></div>`
        + renderLaps(full.laps)
        + renderEfforts("best efforts", full.best_efforts)
        + renderEfforts("segments", full.segment_efforts)
        + `<div class="async"></div>`;
      const streamsRow = body.querySelector(".streams-row");
      const streamsBelow = body.querySelector(".streams-below");
      const asyncDiv = body.querySelector(".async");
      // Streams + zones are separate calls — load them after the table is shown.
      // The "streams" label sits in the table; the charts render full-width below it.
      Promise.allSettled([Strava.getActivityStreams(a.id), Strava.getActivityZones(a.id)])
        .then(([s, z]) => {
          if (s.status === "fulfilled") {
            const charts = renderStreams(s.value);
            if (charts && streamsBelow) { streamsBelow.innerHTML = charts; if (streamsRow) streamsRow.style.display = ""; }
          }
          if (z.status === "fulfilled" && asyncDiv) asyncDiv.innerHTML = renderZones(z.value);
        });
    });
    return det;
  }

  function renderList(list) { listEl.innerHTML = ""; list.slice(0, 25).forEach(a => listEl.appendChild(workoutEl(a))); }

  /* ---------- background kcal enrichment ---------- */
  async function enrich(list) {
    const gen = ++enrichGen;
    const todo = list.filter(a => !Strava.getCachedDetail(a.id));
    const note = () => $("enrich");
    if (!todo.length) { if (note()) note().textContent = ""; return; }
    let done = 0;
    for (const a of todo) {
      if (gen !== enrichGen) return;
      try { await Strava.getActivityCached(a.id); }
      catch (e) { if (/429/.test(e.message)) { if (note()) note().textContent = "(rate-limited)"; return; } }
      done++;
      if (done % 3 === 0 || done === todo.length) {
        renderStats(filtered());
        if (note()) note().textContent = done < todo.length ? `(loading ${done}/${todo.length})` : "";
      }
      await new Promise(res => setTimeout(res, 180));
    }
  }

  function render() {
    const list = filtered();
    statusEl.textContent = ""; // no "X activities total" line
    renderStats(list); renderDow(list); renderTypes(list); renderList(list);
    // Only enrich (fetch details for kcal) the workouts actually shown, to stay
    // well within Strava's shared rate limit on a public page.
    enrich(list.slice(0, 25));
  }

  filtersEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-range]");
    if (!btn) return;
    range = btn.dataset.range;
    [...filtersEl.querySelectorAll("button")].forEach(b => b.classList.toggle("on", b === btn));
    render();
  });

  /* ---------- boot ---------- */
  async function main() {
    if (typeof Strava === "undefined") { statusEl.textContent = "strava.js failed to load."; return; }
    try { await Strava.init(); } catch (e) { statusEl.textContent = e.message; }

    // SETUP MODE: no baked-in public token yet. Help the owner obtain an
    // activity:read_all refresh token to paste into strava.js. Visitors never
    // see this once the token is baked in (then isPublic() is true).
    if (!Strava.isPublic()) {
      connectEl.style.display = "block";
      const scope = Strava.currentScope() || "";
      const haveActivity = /activity:read/.test(scope);
      let html = `<strong>One-time setup</strong> (only you see this; visitors won't once you finish):<br>` +
                 `<a href="${Strava.authorizeUrl()}">Connect with Strava →</a>`;
      if (Strava.isConnected() && Strava.getRefreshToken()) {
        html += haveActivity
          ? `<br><br>Paste this into <code>strava.js</code> → <code>CONFIG.refreshToken</code>, then redeploy:<br>` +
            `<code style="word-break:break-all;">${esc(Strava.getRefreshToken())}</code>`
          : `<br><br><em>The current token's scope is "${esc(scope)}" — that can't read activities. Click Connect above to re-authorize with activity access.</em>`;
      }
      connectEl.innerHTML = html;
      if (!haveActivity) {
        statusEl.textContent = "Connect once with activity access to publish your workouts.";
        return; // don't attempt to load with a read-only / missing token
      }
    }
    const cache = Strava.cachedActivities();
    if (cache && Array.isArray(cache.data) && cache.data.length) { ALL = cache.data; dashEl.style.display = "block"; render(); }
    else statusEl.textContent = "loading all activities…";

    try {
      ALL = await Strava.getAllActivities({ onProgress: n => { if (!cache) statusEl.textContent = `loading… ${n} activities`; } });
      dashEl.style.display = "block";
      render();
      // renderTotals(); // career totals hidden for now
      renderAthleteZones();
    } catch (e) {
      const msg = e.message || String(e);
      if (/scope|activity:read|authoriz/i.test(msg)) {
        statusEl.textContent = "Your authorization is missing the activity:read scope.";
        connectEl.style.display = "block";
        connectEl.innerHTML = `Re-authorize: <a href="${Strava.authorizeUrl()}">Connect with Strava →</a>`;
      } else if (!ALL.length) statusEl.textContent = "Couldn't load activities: " + msg;
    }
  }

  main();
})();
</script>

</body>
</html>
